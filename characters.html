<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人物介绍</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        .characters-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .back-nav {
            margin-bottom: 30px;
        }

        .back-nav button {
            background: linear-gradient(135deg, #2a1a3e, #1a1a3e);
            border: 2px solid #d4af37;
            color: #d4af37;
            padding: 12px 24px;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            letter-spacing: 2px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .back-nav button:hover {
            background: linear-gradient(135deg, #1a1a3e, #2a1a3e);
            transform: translateY(-2px);
        }

        .page-title {
            text-align: center;
            font-family: 'Cinzel Decorative', cursive;
            font-size: 3rem;
            color: #d4af37;
            margin-bottom: 15px;
            letter-spacing: 3px;
        }

        .page-subtitle {
            text-align: center;
            font-family: 'MedievalSharp', cursive;
            font-size: 1.2rem;
            color: #c9a227;
            margin-bottom: 40px;
            font-style: italic;
        }

        .filter-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: rgba(212, 175, 55, 0.1);
            border: 2px solid rgba(212, 175, 55, 0.3);
            color: #d4af37;
            padding: 12px 25px;
            font-family: 'Cinzel', serif;
            font-size: 0.95rem;
            letter-spacing: 2px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn:hover, .filter-btn.active {
            background: linear-gradient(135deg, #d4af37, #c9a227);
            color: #1a1a3e;
            border-color: #d4af37;
            font-weight: 600;
        }

        .characters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .character-card {
            background: linear-gradient(145deg, rgba(20, 30, 50, 0.95), rgba(10, 20, 40, 0.98));
            border: 3px solid rgba(212, 175, 55, 0.4);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            transition: all 0.4s ease;
            cursor: pointer;
            position: relative;
        }

        .character-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.1), transparent 70%);
            opacity: 0;
            transition: opacity 0.5s;
        }

        .character-card:hover {
            border-color: #d4af37;
            transform: translateY(-10px);
            box-shadow: 0 20px 60px rgba(212, 175, 55, 0.3);
        }

        .character-card:hover::before {
            opacity: 1;
        }


        .character-info {
            padding: 25px;
            text-align: center;
        }

        .character-name {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 1.5rem;
            color: #d4af37;
            margin-bottom: 5px;
        }

        .character-title {
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            color: #c9a227;
            font-style: italic;
            margin-bottom: 10px;
        }

        .character-house {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.8rem;
            margin-bottom: 12px;
        }

        .house-gryffindor {
            background: linear-gradient(135deg, #740001, #ae0001);
            color: #ffd700;
        }

        .house-slytherin {
            background: linear-gradient(135deg, #1a472a, #2a623d);
            color: #c9a227;
        }

        .house-ravenclaw {
            background: linear-gradient(135deg, #222f5b, #0e1a40);
            color: #946b2d;
        }

        .house-hufflepuff {
            background: linear-gradient(135deg, #372e29, #ecb939);
            color: #ffd700;
        }

        .house-staff {
            background: linear-gradient(135deg, #2a1a3e, #1a1a3e);
            color: #d4af37;
        }

        .house-muggles {
            background: linear-gradient(135deg, #4a4a4a, #2a2a2a);
            color: #d4af37;
        }

        .house-creatures {
            background: linear-gradient(135deg, #2d4a2d, #1a2e1a);
            color: #90ee90;
        }

        .house-protagonists {
            background: linear-gradient(135deg, #d4af37, #c9a227);
            color: #1a1a3e;
        }

        .house-villains {
            background: linear-gradient(135deg, #ae0001, #8b0000);
            color: #ffcccb;
        }

        .character-role {
            font-family: 'MedievalSharp', cursive;
            font-size: 0.85rem;
            color: #8b6914;
            line-height: 1.6;
        }

        /* 模态框 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: linear-gradient(145deg, rgba(20, 30, 50, 0.98), rgba(10, 20, 40, 0.98));
            border: 4px solid #d4af37;
            border-radius: 25px;
            max-width: 600px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 80px rgba(212, 175, 55, 0.5);
        }

        .modal-header {
            padding: 30px;
            text-align: center;
            border-bottom: 2px solid rgba(212, 175, 55, 0.3);
        }

        .modal-avatar {
            font-size: 5rem;
            margin-bottom: 15px;
        }

        .modal-name {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 2rem;
            color: #d4af37;
            margin-bottom: 10px;
        }

        .modal-title {
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            color: #c9a227;
            font-style: italic;
        }

        .modal-body {
            padding: 30px;
        }

        .modal-section {
            margin-bottom: 25px;
        }

        .modal-section h4 {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: #d4af37;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-section h4::before {
            content: '✨';
        }

        .modal-text {
            font-family: 'MedievalSharp', cursive;
            font-size: 1rem;
            color: #c9a227;
            line-height: 1.8;
        }

        .modal-close {
            text-align: center;
            padding: 20px;
            border-top: 2px solid rgba(212, 175, 55, 0.2);
        }

        .close-btn {
            background: linear-gradient(135deg, #d4af37, #c9a227);
            border: none;
            color: #1a1a3e;
            padding: 12px 40px;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 2px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.4);
        }

        @media (max-width: 768px) {
            .page-title {
                font-size: 2rem;
            }

            .characters-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }

            .character-image {
                height: 150px;
                font-size: 4rem;
            }

            .filter-buttons {
                gap: 10px;
            }

            .filter-btn {
                padding: 10px 20px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="stars-bg"></div>
    <div class="magic-particles"></div>

    <div class="container">
        <div class="characters-container">
            <div class="back-nav">
                <button onclick="goBack()">← 返回大厅</button>
            </div>

            <h1 class="page-title">人物介绍</h1>
            <p class="page-subtitle">Characters of Harry Potter and the Sorcerer's Stone</p>

            <div class="filter-buttons">
                <button class="filter-btn active" onclick="filterCharacters('all')">全部</button>
                <button class="filter-btn" onclick="filterCharacters('protagonists')">核心主角</button>
                <button class="filter-btn" onclick="filterCharacters('staff')">教职员工</button>
                <button class="filter-btn" onclick="filterCharacters('students')">在校学生</button>
                <button class="filter-btn" onclick="filterCharacters('muggles')">麻瓜</button>
                <button class="filter-btn" onclick="filterCharacters('creatures')">神奇生物</button>
            </div>

            <div class="characters-grid" id="charactersGrid">
                <!-- 卡片将通过JavaScript生成 -->
            </div>
        </div>
    </div>

    <!-- 模态框 -->
    <div id="characterModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div id="modalAvatar" class="modal-avatar"></div>
                <div id="modalName" class="modal-name"></div>
                <div id="modalTitle" class="modal-title"></div>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- 详情内容将动态填充 -->
            </div>
            <div class="modal-close">
                <button class="close-btn" onclick="closeModal()">关闭</button>
            </div>
        </div>
    </div>

        function createMagicParticles() {
            const container = document.querySelector('.magic-particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(particle);
            }
        }
        createMagicParticles();

        function renderCharacters(filter = 'all') {
            const grid = document.getElementById('charactersGrid');
            grid.innerHTML = '';

            const filteredCharacters = filter === 'all'
                ? characters
                : characters.filter(c => c.role === filter);

            filteredCharacters.forEach((char, index) => {
                const card = document.createElement('div');
                card.className = 'character-card';
                card.onclick = () => showCharacterDetail(index);

                card.innerHTML = `
                    <div class="character-info">
                        <div class="character-name">${char.name}</div>
                        <div class="character-title">${char.title}</div>
                        <span class="character-house house-${char.house}">${getHouseName(char.house)}</span>
                        <div class="character-role">${char.description.substring(0, 50)}...</div>
                    </div>
                `;

                grid.appendChild(card);
            });
        }

        function getHouseName(house) {
            const houseNames = {
                'gryffindor': '格兰芬多',
                'slytherin': '斯莱特林',
                'ravenclaw': '拉文克劳',
                'hufflepuff': '赫奇帕奇',
                'staff': '教职员工',
                'protagonists': '核心主角',
                'students': '在校学生',
                'muggles': '麻瓜',
                'creatures': '神奇生物',
                'villains': '反派角色'
            };
            return houseNames[house] || house;
        }

        function filterCharacters(filter) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            renderCharacters(filter);
        }

        function showCharacterDetail(index) {
            const char = characters[index];
            const modal = document.getElementById('characterModal');

            // 移除 emoji 显示
            document.getElementById('modalName').textContent = char.name + ' (' + char.nameEn + ')';
            document.getElementById('modalTitle').textContent = char.title;

            const body = document.getElementById('modalBody');
            body.innerHTML = `
                <div class="modal-section">
                    <h4>基本信息</h4>
                    <p class="modal-text">
                        <strong>性别：</strong>${char.gender}<br>
                        <strong>所属：</strong>${getHouseName(char.house)}<br>
                        <strong>出场章节：</strong>${char.chapters}
                    </p>
                </div>
                <div class="modal-section">
                    <h4>人物描述</h4>
                    <p class="modal-text">${char.description}</p>
                </div>
            `;

            modal.style.display = 'flex';
        }

        function closeModal(event) {
            if (event && event.target !== document.getElementById('characterModal')) {
                document.getElementById('characterModal').style.display = 'none';
            } else {
                document.getElementById('characterModal').style.display = 'none';
            }
        }

        function goBack() {
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.8s ease-in-out';
            setTimeout(() => {
                window.location.href = 'academy.html';
            }, 800);
        }

        // 从URL获取参数
        function getUrlParams() {
            const params = {};
            const queryString = window.location.search.substring(1);
            const pairs = queryString.split('&');

            for (let i = 0; i < pairs.length; i++) {
                const pair = pairs[i].split('=');
                if (pair[0]) {
                    params[decodeURIComponent(pair[0])] = decodeURIComponent(pair[1] || '');
                }
            }
            return params;
        }

        // 查找并高亮角色
        function findAndHighlightCharacter(searchTerm) {
            if (!searchTerm) return;

            const foundIndex = characters.findIndex(char => {
                return char.name.includes(searchTerm) ||
                       char.nameEn.toLowerCase().includes(searchTerm.toLowerCase());
            });

            if (foundIndex !== -1) {
                // 先应用过滤器
                const char = characters[foundIndex];
                const filterBtn = document.querySelector(`.filter-btn[onclick*="'${char.role}'"]`);
                if (filterBtn) {
                    filterBtn.click();
                }

                // 等待渲染完成后滚动
                setTimeout(() => {
                    const cards = document.querySelectorAll('.character-card');
                    if (cards[foundIndex]) {
                        cards[foundIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
                        cards[foundIndex].style.animation = 'highlight 2s ease-in-out 3';
                    }
                }, 500);
            }
        }

        // 添加高亮动画样式
        const style = document.createElement('style');
        style.textContent = `
            @keyframes highlight {
                0%, 100% { transform: translateY(-10px); box-shadow: 0 20px 60px rgba(212, 175, 55, 0.3); }
                50% { transform: translateY(-15px) scale(1.05); box-shadow: 0 30px 80px rgba(212, 175, 55, 0.6), 0 0 40px rgba(212, 175, 55, 0.8); }
            }
        `;
        document.head.appendChild(style);

        // 初始化
        window.addEventListener('DOMContentLoaded', function() {
            const params = getUrlParams();

            if (params.filter) {
                const filterBtn = document.querySelector(`.filter-btn[onclick*="'${params.filter}'"]`);
                if (filterBtn) {
                    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                    filterBtn.classList.add('active');
                    renderCharacters(params.filter);
                }
            } else {
                renderCharacters();
            }

            if (params.search) {
                findAndHighlightCharacter(params.search);
            }
        });
    </script>
