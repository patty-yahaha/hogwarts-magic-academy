<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="academy.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        .shop-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 80vh;
        }

        .shop-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .shop-title {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 3rem;
            color: #dda0dd;
            text-shadow: 0 0 30px rgba(221, 160, 221, 0.5);
            margin-bottom: 10px;
        }

        .shop-subtitle {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            color: #8a2be2;
            font-style: italic;
        }

        .robes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .robe-card {
            background: linear-gradient(145deg, rgba(30, 15, 45, 0.95), rgba(20, 10, 30, 0.98));
            border: 3px solid rgba(221, 160, 221, 0.4);
            border-radius: 20px;
            padding: 25px;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            min-height: 280px;
            display: flex;
            flex-direction: column;
        }

        .robe-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(221, 160, 221, 0.1) 0%, transparent 70%);
            animation: robeMagic 15s linear infinite;
            pointer-events: none;
        }

        @keyframes robeMagic {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .robe-card:hover {
            transform: translateY(-8px);
            border-color: #dda0dd;
            box-shadow: 0 15px 40px rgba(221, 160, 221, 0.3);
        }

        .robe-card.owned {
            border-color: #4caf50;
            background: linear-gradient(145deg, rgba(46, 125, 50, 0.15), rgba(27, 94, 32, 0.2));
        }

        .robe-card.owned::after {
            content: '✓ 已拥有';
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(76, 175, 80, 0.9);
            color: white;
            padding: 5px 12px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-family: 'Cinzel', serif;
        }

        .robe-card.rare {
            border-color: #ffd700;
            box-shadow: 0 5px 25px rgba(255, 215, 0, 0.2);
        }

        .robe-card.rare::before {
            content: '★ 稀有';
            position: absolute;
            top: 15px;
            left: 15px;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #1a0f00;
            padding: 5px 12px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            z-index: 1;
        }

        .robe-icon {
            font-size: 4rem;
            text-align: center;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 0 15px rgba(221, 160, 221, 0.5));
        }

        .robe-name {
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            color: #dda0dd;
            font-weight: 600;
            margin-bottom: 10px;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 1;
        }

        .robe-description {
            font-size: 0.95rem;
            color: #b899e0;
            line-height: 1.6;
            flex: 1;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
        }

        .robe-price {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            margin-top: auto;
            position: relative;
            z-index: 1;
        }

        .price-tag {
            background: linear-gradient(135deg, rgba(221, 160, 221, 0.2), rgba(138, 43, 226, 0.3));
            border: 2px solid #dda0dd;
            border-radius: 12px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .price-tag.owned {
            border-color: #4caf50;
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.2), rgba(46, 125, 50, 0.3));
        }

        .price-icon {
            font-size: 1.5rem;
        }

        .price-amount {
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            font-weight: bold;
            color: #dda0dd;
        }

        .price-tag.owned .price-amount {
            color: #4caf50;
        }

        .buy-btn {
            background: linear-gradient(135deg, #dda0dd, #8a2be2);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .buy-btn:hover {
            background: linear-gradient(135deg, #8a2be2, #6a5acd);
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(138, 43, 226, 0.4);
        }

        .buy-btn:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }

        .buy-btn.owned {
            background: #4caf50;
            cursor: default;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #8a2be2;
            font-size: 1.2rem;
        }

        .empty-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* 返回按钮样式 */
        .header-nav {
            margin-bottom: 30px;
        }

        .back-button {
            background: linear-gradient(135deg, #4a2a5a 0%, #6a3a7a 100%);
            border: 2px solid #dda0dd;
            color: #dda0dd;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: 'Cinzel', serif;
        }

        .back-button:hover {
            background: linear-gradient(135deg, #6a3a7a 0%, #4a2a5a 100%);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(221, 160, 221, 0.6);
        }

        /* 金币显示 */
        .coin-display {
            position: fixed;
            top: 20px;
            right: 30px;
            background: linear-gradient(145deg, rgba(30, 20, 10, 0.95), rgba(20, 10, 5, 0.98));
            border: 3px solid #d4af37;
            border-radius: 15px;
            padding: 12px 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
            z-index: 100;
        }

        .coin-icon {
            font-size: 1.8rem;
            filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.8));
        }

        .coin-amount {
            font-size: 1.5rem;
            color: #d4af37;
            font-weight: bold;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        .coin-label {
            font-size: 0.9rem;
            color: #c9a830;
            margin-left: 5px;
        }

        @media (max-width: 900px) {
            .shop-title {
                font-size: 2rem;
            }

            .robes-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Magical SVG styling with glow effect */
        .shop-title svg {
            width: 3.5rem;
            height: 3.5rem;
            filter: drop-shadow(0 0 15px rgba(221, 160, 221, 0.6));
            vertical-align: text-bottom;
        }
        .empty-icon svg {
            width: 5rem;
            height: 5rem;
            filter: drop-shadow(0 0 20px rgba(221, 160, 221, 0.6));
        }
        .robe-icon svg {
            width: 4rem;
            height: 4rem;
            filter: drop-shadow(0 0 15px rgba(221, 160, 221, 0.5));
        }
        .price-icon svg {
            width: 1.5rem;
            height: 1.5rem;
            filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.6));
        }
    </style>
</head>

            {

                description: '魔法部员工为了伪装成麻瓜弄出的奇葩搭配，如粗花呢西服配高统橡皮套鞋、苏格兰褶裥短裙配南美披风；还有老巫师阿尔奇坚持穿的印花长睡衣。',
                price: 150,
                rare: false
            },
            {
                id: 'winter_cloak',
                name: '冬用斗篷（黑色，银扣）',
                icon: '<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><path d="M16 40L16 12Q16 6 24 6Q32 6 32 12L32 40" stroke="#333" stroke-width="2" fill="#222"/><path d="M16 12Q10 12 10 16L10 40" stroke="#333" stroke-width="2" fill="#222"/><path d="M32 12Q38 12 38 16L38 40" stroke="#333" stroke-width="2" fill="#222"/><circle cx="16" cy="18" r="2" fill="#c0c0c0"/><circle cx="32" cy="18" r="2" fill="#c0c0c0"/></svg>',
                description: '霍格沃茨新生必备的御寒衣物。',
                price: 180,

            },
            {
                id: 'invisibility_cloak',
                name: '隐形斗篷 (Invisibility Cloak)',
                icon: '<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="invisGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#e8e8e8;stop-opacity:0.3"/><stop offset="50%" style="stop-color:#c0c0c0;stop-opacity:0.5"/><stop offset="100%" style="stop-color:#e8e8e8;stop-opacity:0.3"/></linearGradient></defs><path d="M16 40L16 14Q16 8 24 8Q32 8 32 14L32 40" stroke="#c0c0c0" stroke-width="2" fill="url(#invisGrad)" stroke-opacity="0.6"/><path d="M16 14Q10 14 10 18L10 40" stroke="#c0c0c0" stroke-width="2" fill="url(#invisGrad)" stroke-opacity="0.6"/><path d="M32 14Q38 14 38 18L38 40" stroke="#c0c0c0" stroke-width="2" fill="url(#invisGrad)" stroke-opacity="0.6"/><path d="M20 16L28 16" stroke="#fff" stroke-width="1" stroke-opacity="0.8"/></svg>',
                description: '哈利继承自父亲的宝物，是一种像液体般银光闪闪、比丝还要光滑的奇妙织物，穿上后全身会完全隐形。',
                price: 1000,
                rare: true
            },
            {
                id: 'fur_cloak',
                name: '毛皮斗篷',
                icon: '<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><path d="M16 40L16 12Q16 6 24 6Q32 6 32 12L32 40" stroke="#5c4033" stroke-width="2" fill="#8b5a2b"/><path d="M16 12Q10 12 10 16L10 40" stroke="#5c4033" stroke-width="2" fill="#8b5a2b"/><path d="M32 12Q38 12 38 16L38 40" stroke="#5c4033" stroke-width="2" fill="#8b5a2b"/><path d="M18 14L22 18L26 14L30 18" stroke="#a0522d" stroke-width="1" fill="none"/></svg>',
                description: '德姆斯特朗魔法学校的校服配置，因为该校位于非常寒冷的北部地区。',
                price: 600,
                rare: false
            },
            {
                id: 'south_american_cloak',
                name: '南美披风',
                icon: '<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><path d="M12 40L12 12Q12 6 24 6Q36 6 36 12L36 40" stroke="#8b0000" stroke-width="2" fill="#a52a2a"/><path d="M12 12Q6 12 6 16L6 40" stroke="#8b0000" stroke-width="2" fill="#a52a2a"/><path d="M36 12Q42 12 42 16L42 40" stroke="#8b0000" stroke-width="2" fill="#a52a2a"/><path d="M18 16L30 16" stroke="#ffd700" stroke-width="1.5"/></svg>',
                description: '魁地奇世界杯营地上，一名魔法部员工随意套在苏格兰短裙外的服饰。',
                price: 120,
                rare: false
            },
            {
                id: 'garlic_scarf',
                name: '大围巾',
                icon: '<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="scarfGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#800020"/><stop offset="50%" style="stop-color:#a52a2a"/><stop offset="100%" style="stop-color:#800020"/></linearGradient></defs><path d="M10 20L38 20" stroke="url(#scarfGrad)" stroke-width="8" stroke-linecap="round"/><path d="M12 20L12 38Q12 42 16 42L32 42Q36 42 36 38L36 20" stroke="url(#scarfGrad)" stroke-width="8" fill="none"/><path d="M16 20L16 36M20 20L20 36M24 20L24 36M28 20L28 36M32 20L32 36" stroke="#5c0a1a" stroke-width="1"/></svg>',
                description: '奇洛教授常年戴在头上的装饰，带有大蒜味，他自称是非洲王子送的礼物。',
                price: 30,
                rare: false
            }
        ];

        const INVENTORY_KEY = 'hogwartsInventory';
        const COINS_KEY = 'hogwartsCoins';

        // 获取金币数量
        function getCoins() {
            return parseInt(localStorage.getItem(COINS_KEY) || '0');
        }

        // 更新金币显示
        function updateCoinDisplay() {
            document.getElementById('coinAmount').textContent = getCoins();
        }

        // 获取背包
        function getInventory() {
            const data = localStorage.getItem(INVENTORY_KEY);
            return data ? JSON.parse(data) : [];
        }

        // 保存背包
        function saveInventory(inventory) {
            localStorage.setItem(INVENTORY_KEY, JSON.stringify(inventory));
        }

        // 检查是否拥有
        function hasItem(itemId) {
            const inventory = getInventory();
            return inventory.some(item => item.id === itemId);
        }

        // 购买长袍
        function buyRobe(robeId) {
            const robe = ROBES.find(r => r.id === robeId);
            if (!robe) return;

            const coins = getCoins();

            if (coins < robe.price) {
                alert(`金币不足！\n需要 ${robe.price} 金加隆，当前只有 ${coins} 金加隆。`);
                return;
            }

            if (confirm(`确定要购买「${robe.name}」吗？\n价格：${robe.price} 金加隆`)) {
                // 扣除金币
                const newCoins = coins - robe.price;
                localStorage.setItem(COINS_KEY, newCoins.toString());

                // 添加到背包
                const inventory = getInventory();
                inventory.push({
                    id: robe.id,
                    name: robe.name,
                    icon: robe.icon,
                    description: robe.description,
                    price: robe.price,
                    purchaseDate: new Date().toISOString(),
                    type: 'robe'
                });
                saveInventory(inventory);

                // 更新显示
                updateCoinDisplay();
                renderRobes();

                alert(`购买成功！\n你获得了「${robe.name}」`);
            }
        }

        // 渲染长袍列表
        function renderRobes() {
            const container = document.getElementById('robesGrid');
            const inventory = getInventory();

            container.innerHTML = ROBES.map(robe => {
                const owned = inventory.some(item => item.id === robe.id);
                const coins = getCoins();
                const canAfford = coins >= robe.price;

                return `
                    <div class="robe-card ${owned ? 'owned' : ''} ${robe.rare ? 'rare' : ''}">
                        <div class="robe-icon">${robe.icon}</div>
                        <div class="robe-name">${robe.name}</div>
                        <div class="robe-description">${robe.description}</div>
                        <div class="robe-price">
                            <div class="price-tag ${owned ? 'owned' : ''}">
                                <span class="price-icon">${owned ? '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#4caf50" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>' : '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#ffd700" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 6V18M9 12h6"/></svg>'}</span>
                                <span class="price-amount">${owned ? '已拥有' : robe.price}</span>
                            </div>
                            <button class="buy-btn ${owned ? 'owned' : ''}"
                                    ${owned ? 'disabled' : ''}
                                    onclick="${owned ? '' : `buyRobe('${robe.id}')`}"
                                    ${!canAfford && !owned ? 'disabled' : ''}>
                                ${owned ? '已拥有' : '购买'}
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 创建魔法粒子
        function createMagicParticles() {
            const container = document.querySelector('.magic-particles');
            if (!container) return;
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(particle);
            }
        }

        // 返回
        function goBack() {
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.5s ease-in-out';
            setTimeout(() => {
                window.location.href = 'diagon-alley.html';
            }, 500);
        }

        // 初始化
        updateCoinDisplay();
        renderRobes();
        createMagicParticles();
    </script>
    <script src="draggable-coin.js"></script>
</body>
</html>
