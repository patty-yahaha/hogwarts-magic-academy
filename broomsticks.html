<head>

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="academy.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        .broomsticks-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 80vh;
        }

        .header-section {
            text-align: center;
            margin-bottom: 50px;
        }

        .shop-title {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 3rem;
            color: #d4af37;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.6);
            margin-bottom: 10px;
        }

        .shop-subtitle {
            font-family: 'Cinzel', serif;
            font-size: 1.3rem;
            color: #8b7355;
            font-style: italic;
            margin-bottom: 30px;
        }

        /* 碎片显示 */
        .fragments-display {
            background: linear-gradient(145deg, rgba(139, 69, 19, 0.3), rgba(10, 20, 40, 0.98));
            border: 3px solid #8b4513;
            border-radius: 15px;
            padding: 15px 30px;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .fragment-icon {
            font-size: 2rem;
            filter: drop-shadow(0 0 10px rgba(139, 69, 19, 0.8));
        }

        .fragment-count {
            font-size: 1.8rem;
            color: #deb887;
            font-weight: bold;
            font-family: 'Cinzel Decorative', cursive;
        }

        /* 扫帚网格 */
        .broomsticks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 30px;
        }

        /* 扫帚卡片 */
        .broom-card {
            background: linear-gradient(145deg, rgba(30, 20, 10, 0.95), rgba(20, 10, 5, 0.98));
            border: 4px solid #8b4513;
            border-radius: 20px;
            padding: 25px;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .broom-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center, rgba(139, 69, 19, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .broom-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        /* 已装备标识 */
        .equipped-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-family: 'Cinzel', serif;
            z-index: 10;
            box-shadow: 0 0 10px rgba(39, 174, 96, 0.6);
        }

        /* 稀有度标签 */
        .rarity-tag {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            text-transform: uppercase;
            z-index: 5;
        }

        .rarity-common {
            background: linear-gradient(135deg, #95a5a6, #7f8c8d);
            color: white;
        }

        .rarity-uncommon {
            background: linear-gradient(135deg, #5dade2, #3498db);
            color: white;
        }

        .rarity-rare {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: white;
        }

        .rarity-epic {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
            animation: epicGlow 2s ease-in-out infinite;
        }

        .rarity-legendary {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            animation: legendaryGlow 1.5s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.6);
        }

        @keyframes epicGlow {
            0%, 100% { box-shadow: 0 0 15px rgba(243, 156, 18, 0.4); }
            50% { box-shadow: 0 0 25px rgba(243, 156, 18, 0.7); }
        }

        @keyframes legendaryGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(231, 76, 60, 0.6); }
            50% { box-shadow: 0 0 35px rgba(231, 76, 60, 0.9); }
        }

        /* 扫帚图标 */
        .broom-icon {
            font-size: 5rem;
            text-align: center;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
        }

        .broom-card.rare .broom-icon {
            filter: drop-shadow(0 0 15px rgba(155, 89, 182, 0.5));
        }

        .broom-card.epic .broom-icon {
            filter: drop-shadow(0 0 20px rgba(243, 156, 18, 0.7)) brightness(1.2);
            animation: iconFloat 3s ease-in-out infinite;
        }

        .broom-card.legendary .broom-icon {
            filter: drop-shadow(0 0 25px rgba(231, 76, 60, 0.9)) brightness(1.3);
            animation: legendaryIconFloat 2s ease-in-out infinite;
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-5px) rotate(2deg); }
        }

        @keyframes legendaryIconFloat {
            0%, 100% { transform: translateY(0) scale(1); filter: drop-shadow(0 0 25px rgba(231, 76, 60, 0.9)) brightness(1.3); }
            50% { transform: translateY(-8px) scale(1.05); filter: drop-shadow(0 0 40px rgba(231, 76, 60, 1)) brightness(1.5); }
        }

        .broom-name-zh {
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            color: #d4af37;
            margin-bottom: 5px;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .broom-name-en {
            font-size: 1rem;
            color: #c9a227;
            margin-bottom: 10px;
            font-style: italic;
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .broom-card.legendary .broom-name-zh {
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }

        .broom-card.epic .broom-name-zh {
            color: #ff9500;
            text-shadow: 0 0 8px rgba(255, 149, 0, 0.6);
        }

        /* 性能属性 */
        .broom-stats {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .stat-label {
            color: #a08050;
        }

        .stat-value {
            font-weight: bold;
        }

        .stat-value.speed-1 { color: #95a5a6; }
        .stat-value.speed-2 { color: #5dade2; }
        .stat-value.speed-3 { color: #9b59b6; }
        .stat-value.speed-4 { color: #f39c12; }
        .stat-value.speed-5 { color: #e74c3c; }

        .stat-value.stability-1 { color: #95a5a6; }
        .stat-value.stability-2 { color: #5dade2; }
        .stat-value.stability-3 { color: #9b59b6; }
        .stat-value.stability-4 { color: #f39c12; }
        .stat-value.stability-5 { color: #e74c3c; }

        /* 价格和购买按钮 */
        .broom-footer {
            margin-top: auto;
            position: relative;
            z-index: 1;
        }

        .price {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 12px;
            font-size: 1.1rem;
        }

        .price-coin {
            font-size: 1.3rem;
        }

        .price-amount {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 1.5rem;
            color: #ffd700;
            font-weight: bold;
        }

        .buy-btn {
            width: 100%;
            background: linear-gradient(145deg, #8b4513, #a0522d);
            border: 2px solid #deb887;
            color: #deb887;
            padding: 12px 20px;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .buy-btn:hover:not(:disabled) {
            background: linear-gradient(145deg, #a0522d, #cd853f);
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(222, 184, 135, 0.5);
        }

        .buy-btn:disabled {
            background: linear-gradient(145deg, #444, #555);
            border-color: #666;
            color: #888;
            cursor: not-allowed;
        }

        .buy-btn.equipped {
            background: linear-gradient(145deg, #27ae60, #2ecc71);
            border-color: #27ae60;
            color: white;
        }

        /* 语言切换 */
        .stat-label-en, .broom-name-en {
            display: none;
        }

        body.lang-en .stat-label-zh, body.lang-en .broom-name-zh {
            display: none;
        }

        body.lang-en .stat-label-en, body.lang-en .broom-name-en {
            display: block !important;
        }

        body.lang-zh .stat-label-en, body.lang-zh .broom-name-en {
            display: none;
        }

        body.lang-zh .stat-label-zh, body.lang-zh .broom-name-zh {
            display: block !important;
        }

        /* 金币显示 */
        .coin-display {
            position: fixed;
            top: 20px;
            right: 30px;
            background: linear-gradient(145deg, rgba(30, 20, 10, 0.95), rgba(20, 10, 5, 0.98));

            border-radius: 15px;
            padding: 12px 25px;
            display: flex;
            align-items: center;
            gap: 10px;

        }

        .coin-icon {
            font-size: 1.8rem;
            filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.8));

        .coin-amount {
            font-size: 1.5rem;
            color: #d4af37;
            font-weight: bold;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);

            font-size: 0.9rem;
            color: #c9a830;

            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 30px;
            text-align: center;

        .equipped-title {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 1.5rem;
            color: #27ae60;
            margin-bottom: 15px;
        }

        .equipped-broom {
            display: flex;
            align-items: center;
            gap: 20px;
            justify-content: center;
        }

        .equipped-icon {
            font-size: 4rem;
            filter: drop-shadow(0 0 15px rgba(39, 174, 96, 0.6));

        .equipped-info {
            text-align: left;

        .equipped-name {
            font-family: 'Cinzel', serif;
            font-size: 1.3rem;
            color: #27ae60;
            font-weight: bold;
        }

        .equipped-bonus {
            font-size: 0.95rem;
            color: #a08050;
            margin-top: 5px;
        }

        @media (max-width: 1024px) {
            .broomsticks-grid {
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .broomsticks-grid {
                grid-template-columns: 1fr;
            }

            .shop-title {
                font-size: 2rem;
            }
        }
    </style>
</head>

            rare: {
                label: { zh: '稀有', en: 'Rare' },
                borderColor: '#9b59b6'
            },
            epic: {
                label: { zh: '史诗', en: 'Epic' },
                borderColor: '#f39c12'
            },
            legendary: {
                label: { zh: '传奇', en: 'Legendary' },
                borderColor: '#e74c3c'
            }
        };

        // 获取玩家数据
        function getPlayerData() {
            return JSON.parse(localStorage.getItem('hogwartsPlayer') || '{}');
        }

        // 获取金币
        function getCoins() {
            return parseInt(localStorage.getItem('hogwartsCoins') || '0');
        }

        // 获取碎片
        function getFragments() {
            return parseInt(localStorage.getItem('broomFragments') || '0');
        }

        // 获取已拥有的扫帚
        function getOwnedBrooms() {
            return JSON.parse(localStorage.getItem('ownedBrooms') || '[]');
        }

        // 获取当前装备的扫帚
        function getEquippedBroom() {
            const playerData = getPlayerData();
            return playerData.equippedBroom || null;
        }

        // 初始化金币和碎片显示
        function initDisplay() {
            document.getElementById('coinAmount').textContent = getCoins();
            document.getElementById('fragmentCount').textContent = getFragments();
            updateEquippedBroom();
        }

        // 更新装备的扫帚显示
        function updateEquippedBroom() {
            const equippedBroom = getEquippedBroom();
            const equippedSection = document.getElementById('equippedSection');
            const equippedBroomEl = document.getElementById('equippedBroom');

            if (equippedBroom) {
                const broom = BROOMSTICKS.find(b => b.id === equippedBroom);
                if (broom) {
                    equippedBroomEl.innerHTML = `
                        <div class="equipped-icon">${broom.icon}</div>
                        <div class="equipped-info">
                            <div class="equipped-name">${currentLang === 'zh' ? broom.name.zh : broom.name.en}</div>
                            <div class="equipped-bonus">
                                <span class="stat-label-zh">速度: ${'⭐'.repeat(broom.speed)} 稳定性: ${'⭐'.repeat(broom.stability)}</span>
                                <span class="stat-label-en">Speed: ${'⭐'.repeat(broom.speed)} Stability: ${'⭐'.repeat(broom.stability)}</span>
                            </div>
                            <div style="color: #27ae60; margin-top: 5px;">
                                <span class="stat-label-zh">✨ ${broom.bonus.zh}</span>
                                <span class="stat-label-en">✨ ${broom.bonus.en}</span>
                            </div>
                        </div>
                    `;
                }
            } else {
                equippedBroomEl.innerHTML = `
                    <span class="stat-label-zh">尚未装备任何扫帚</span>
                    <span class="stat-label-en">No broom equipped yet</span>
                `;
            }
        }

        // 渲染扫帚列表
        function renderBroomsticks() {
            const grid = document.getElementById('broomsticksGrid');
            const ownedBrooms = getOwnedBrooms();
            const equippedBroom = getEquippedBroom();

            grid.innerHTML = BROOMSTICKS.map(broom => {
                const isOwned = ownedBrooms.includes(broom.id);
                const isEquipped = equippedBroom === broom.id;
                const rarity = RARITY_CONFIG[broom.rarity];

                return `
                    <div class="broom-card ${broom.rarity}" data-id="${broom.id}">
                        ${isEquipped ? '<span class="equipped-badge">已装备 / Equipped</span>' : ''}
                        <span class="rarity-tag rarity-${broom.rarity}">${rarity.label[currentLang] || rarity.label.zh}</span>
                        <div class="broom-icon">${broom.icon}</div>
                        <div class="broom-name-zh">${broom.name.zh}</div>
                        <div class="broom-name-en">${broom.name.en}</div>
                        <div style="text-align: center; color: #a08050; margin-bottom: 10px; position: relative; z-index: 1;">
                            <span class="stat-label-zh">${broom.description.zh}</span>
                            <span class="stat-label-en">${broom.description.en}</span>
                        </div>
                        <div class="broom-stats">
                            <div class="stat-row">
                                <span class="stat-label stat-label-zh">速度</span>
                                <span class="stat-label stat-label-en">Speed</span>
                                <span class="stat-value speed-${broom.speed}">${'⭐'.repeat(broom.speed)}</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label stat-label-zh">稳定性</span>
                                <span class="stat-label stat-label-en">Stability</span>
                                <span class="stat-value stability-${broom.stability}">${'⭐'.repeat(broom.stability)}</span>
                            </div>
                            <div class="stat-row" style="margin-bottom: 0;">
                                <span class="stat-label stat-label-zh">特效</span>
                                <span class="stat-label stat-label-en">Effect</span>
                                <span class="stat-value" style="color: #d4af37;">
                                    <span class="stat-label-zh">✨ ${broom.bonus.zh}</span>
                                    <span class="stat-label-en">✨ ${broom.bonus.en}</span>
                                </span>
                            </div>
                        </div>
                        <div class="broom-footer">
                            <div class="price">
                                <span class="price-coin">🪙</span>
                                <span class="price-amount">${broom.price}</span>
                            </div>
                            ${isEquipped ? `
                                <button class="buy-btn equipped" disabled>
                                    <span class="stat-label-zh">已装备 ✓</span>
                                    <span class="stat-label-en">Equipped ✓</span>
                                </button>
                            ` : isOwned ? `
                                <button class="buy-btn" onclick="equipBroom('${broom.id}')">
                                    <span class="stat-label-zh">装备</span>
                                    <span class="stat-label-en">Equip</span>
                                </button>
                            ` : `
                                <button class="buy-btn" onclick="buyBroom('${broom.id}')">
                                    <span class="stat-label-zh">购买</span>
                                    <span class="stat-label-en">Buy</span>
                                </button>
                            `}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 购买扫帚
        function buyBroom(broomId) {
            const broom = BROOMSTICKS.find(b => b.id === broomId);
            if (!broom) return;

            const coins = getCoins();
            if (coins < broom.price) {
                alert(currentLang === 'zh' ?
                    `金币不足！\n\n需要: ${broom.price} 金加隆\n当前: ${coins} 金加隆` :
                    `Not enough coins!\n\nNeeded: ${broom.price} Galleons\nCurrent: ${coins} Galleons`);
                return;
            }

            if (confirm(currentLang === 'zh' ?
                `确定购买 ${broom.name.zh} 吗？\n\n价格: ${broom.price} 金加隆\n\n${broom.description.zh}` :
                `Buy ${broom.name.en}?\n\nPrice: ${broom.price} Galleons\n\n${broom.description.en}`)) {
                // 扣除金币
                localStorage.setItem('hogwartsCoins', (coins - broom.price).toString());

                // 添加到已拥有列表
                const ownedBrooms = getOwnedBrooms();
                if (!ownedBrooms.includes(broomId)) {
                    ownedBrooms.push(broomId);
                    localStorage.setItem('ownedBrooms', JSON.stringify(ownedBrooms));
                }

                // 更新累计金币
                const playerData = getPlayerData();
                playerData.cumulativeCoins = (playerData.cumulativeCoins || 0) + broom.price;
                localStorage.setItem('hogwartsPlayer', JSON.stringify(playerData));

                alert(currentLang === 'zh' ?
                    `🎉 购买成功！\n\n你获得了: ${broom.name.zh}` :
                    `🎉 Purchase successful!\n\nYou received: ${broom.name.en}`);

                initDisplay();
                renderBroomsticks();
            }
        }

        // 装备扫帚
        function equipBroom(broomId) {
            const broom = BROOMSTICKS.find(b => b.id === broomId);
            if (!broom) return;

            const playerData = getPlayerData();
            playerData.equippedBroom = broomId;
            playerData.broomSpeed = broom.speed;
            playerData.broomStability = broom.stability;
            localStorage.setItem('hogwartsPlayer', JSON.stringify(playerData));

            // 同时保存到飞行课游戏状态
            const flyingState = JSON.parse(localStorage.getItem('flyingGameState') || '{}');
            flyingState.equippedBroom = {
                id: broomId,
                name: broom.name,
                icon: broom.icon,
                speed: broom.speed,
                stability: broom.stability,
                bonus: broom.bonus
            };
            localStorage.setItem('flyingGameState', JSON.stringify(flyingState));

            alert(currentLang === 'zh' ?
                `⚔️ 装备成功！\n\n当前装备: ${broom.name.zh}\n速度: ${broom.speed} | 稳定性: ${broom.stability}` :
                `⚔️ Equipped successfully!\n\nCurrent: ${broom.name.en}\nSpeed: ${broom.speed} | Stability: ${broom.stability}`);

            initDisplay();
            renderBroomsticks();
        }

        // 返回
        function goBack() {
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.5s ease-in-out';
            setTimeout(() => {
                window.location.href = 'diagon-alley.html';
            }, 500);
        }

        // 创建魔法粒子
        function createMagicParticles() {
            const container = document.querySelector('.magic-particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(particle);
            }
        }
        createMagicParticles();

        // 初始化
        function init() {
            // 设置body语言类
            document.body.classList.remove('lang-zh', 'lang-en');
            document.body.classList.add(currentLang === 'zh' ? 'lang-zh' : 'lang-en');

            // 更新返回按钮
            document.querySelector('.back-btn').innerHTML = currentLang === 'zh' ? '← 返回' : '← Back';

            initDisplay();
            renderBroomsticks();
        }

        init();
    </script>
</body>
</html>
