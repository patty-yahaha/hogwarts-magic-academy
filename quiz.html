<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>哈利波特魔法测试</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        .quiz-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .back-nav {
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-nav button {
            background: linear-gradient(135deg, #2a1a3e, #1a1a3e);
            border: 2px solid #d4af37;
            color: #d4af37;
            padding: 12px 24px;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            letter-spacing: 2px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .back-nav button:hover {
            background: linear-gradient(135deg, #1a1a3e, #2a1a3e);
            transform: translateY(-2px);
        }

        .lang-btn {
            background: linear-gradient(135deg, #d4af37, #c9a227) !important;
            border: 2px solid #d4af37 !important;
            color: #1a1a3e !important;
        }

        .lang-btn:hover {
            background: linear-gradient(135deg, #c9a227, #b8911f) !important;
        }

        .page-title {
            text-align: center;
            font-family: 'Cinzel Decorative', cursive;
            font-size: 3rem;
            color: #d4af37;
            margin-bottom: 15px;
            letter-spacing: 3px;
        }

        .page-subtitle {
            text-align: center;
            font-family: 'MedievalSharp', cursive;
            font-size: 1.2rem;
            color: #c9a227;
            margin-bottom: 50px;
            font-style: italic;
        }

        .difficulty-selection {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-bottom: 40px;
        }

        .difficulty-card {
            background: linear-gradient(145deg, rgba(20, 30, 50, 0.95), rgba(10, 20, 40, 0.98));
            border: 3px solid rgba(212, 175, 55, 0.4);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s ease;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .difficulty-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.1), transparent 70%);
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        .difficulty-card:hover {
            border-color: #d4af37;
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 20px 60px rgba(212, 175, 55, 0.4);
        }

        .difficulty-card:hover::before {
            opacity: 1;
        }

        .difficulty-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .difficulty-name {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 1.8rem;
            color: #d4af37;
            margin-bottom: 15px;
        }

        .difficulty-desc {
            font-size: 1rem;
            color: #c9a227;
            margin-bottom: 15px;
        }

        .difficulty-level {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .easy .difficulty-level {
            background: linear-gradient(135deg, #2a1a3e, #1a472a);
            color: #90ee90;
        }

        .medium .difficulty-level {
            background: linear-gradient(135deg, #2a1a3e, #d4af37);
            color: #fff;
        }

        .hard .difficulty-level {
            background: linear-gradient(135deg, #2a1a3e, #ae0001);
            color: #ffcccb;
        }

        /* 测试界面 */
        .quiz-interface {
            display: none;
        }

        .quiz-progress {
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.2rem;
            color: #d4af37;
        }

        .question-card {
            background: linear-gradient(145deg, rgba(20, 30, 50, 0.95), rgba(10, 20, 40, 0.98));
            border: 3px solid rgba(212, 175, 55, 0.4);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .question-number {
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            color: #c9a227;
            background: rgba(212, 175, 55, 0.1);
            padding: 5px 15px;
            border-radius: 15px;
        }

        .question-text {
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            color: #d4af37;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.8;
        }

        .options-grid {
            display: grid;
            gap: 15px;
        }

        .option-btn {
            background: rgba(212, 175, 55, 0.1);
            border: 2px solid rgba(212, 175, 55, 0.3);
            color: #d4af37;
            padding: 18px 25px;
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            letter-spacing: 1px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }

        .option-btn:hover {
            background: rgba(212, 175, 55, 0.2);
            border-color: rgba(212, 175, 55, 0.6);
            transform: translateX(10px);
        }

        .option-btn.correct {
            background: linear-gradient(135deg, rgba(42, 71, 42, 0.4), rgba(42, 71, 42, 0.6));
            border-color: #2a472a;
            color: #90ee90;
        }

        .option-btn.incorrect {
            background: linear-gradient(135deg, rgba(174, 0, 1, 0.4), rgba(174, 0, 1, 0.6));
            border-color: #ae0001;
            color: #ffcccb;
        }

        .explanation {
            margin-top: 15px;
            padding: 15px 20px;
            background: rgba(212, 175, 55, 0.1);
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 15px;
            display: none;
        }

        .explanation.show {
            display: block;
            animation: fadeIn 0.5s ease-in;
        }

        .explanation h4 {
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            color: #d4af37;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .explanation p {
            font-family: 'MedievalSharp', cursive;
            font-size: 0.9rem;
            color: #c9a227;
            line-height: 1.6;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .quiz-footer {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .quiz-btn {
            background: linear-gradient(135deg, #d4af37, #c9a227);
            border: none;
            color: #1a1a3e;
            padding: 15px 40px;
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 2px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .quiz-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.4);
        }

        .quiz-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .result-card {
            display: none;
            background: linear-gradient(145deg, rgba(20, 30, 50, 0.95), rgba(10, 20, 40, 0.98));
            border: 3px solid #d4af37;
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .result-score {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 4rem;
            color: #d4af37;
            margin-bottom: 20px;
        }

        .result-message {
            font-family: 'MedievalSharp', cursive;
            font-size: 1.5rem;
            color: #c9a227;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .difficulty-selection {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="stars-bg"></div>
    <div class="magic-particles"></div>

    <div class="container">
        <div class="quiz-container">
            <div class="back-nav">
                <button onclick="goBack()" id="backBtn">← 返回大厅</button>
                <button onclick="toggleLanguage()" id="langBtn" class="lang-btn">English</button>
            </div>

            <h1 class="page-title" id="pageTitle">⚡ 魔法测试 ⚡</h1>
            <p class="page-subtitle" id="pageSubtitle">Test Your Magical Knowledge</p>
            <p class="page-info" style="text-align: center; font-family: 'MedievalSharp', cursive; font-size: 0.9rem; color: #8b6914; margin-bottom: 30px;" id="pageInfo">初级挑战30题 | 中级挑战5题 | 高级挑战30题</p>

            <!-- 难度选择 -->
            <div id="difficultySelection" class="difficulty-selection">
                <div class="difficulty-card easy" onclick="startQuiz('easy')">
                    <div class="difficulty-icon">🌟</div>
                    <div class="difficulty-name" data-zh="初级挑战" data-en="Easy Challenge">初级挑战</div>
                    <div class="difficulty-desc" data-zh="适合新手的魔法基础测试" data-en="Basic magic test for beginners">适合新手的魔法基础测试</div>
                    <span class="difficulty-level">EASY</span>
                </div>

                <div class="difficulty-card medium" onclick="startQuiz('medium')">
                    <div class="difficulty-icon">⚡</div>
                    <div class="difficulty-name" data-zh="中级挑战" data-en="Medium Challenge">中级挑战</div>
                    <div class="difficulty-desc" data-zh="需要一定魔法知识的挑战" data-en="Challenge requiring some magical knowledge">需要一定魔法知识的挑战</div>
                    <span class="difficulty-level">MEDIUM</span>
                </div>

                <div class="difficulty-card hard" onclick="startQuiz('hard')">
                    <div class="difficulty-icon">🔥</div>
                    <div class="difficulty-name" data-zh="高级挑战" data-en="Hard Challenge">高级挑战</div>
                    <div class="difficulty-desc" data-zh="只有真正的巫师才能通过" data-en="Only true wizards can pass">只有真正的巫师才能通过</div>
                    <span class="difficulty-level">HARD</span>
                </div>
            </div>

            <!-- 测试界面 -->
            <div id="quizInterface" class="quiz-interface">
                <div class="quiz-progress">
                    <span id="progressText">问题 1 / 30</span>
                </div>

                <div class="question-card">
                    <div id="questionText" class="question-text"></div>
                    <div id="optionsGrid" class="options-grid"></div>
                </div>

                <div class="quiz-footer">
                    <button id="nextBtn" class="quiz-btn" onclick="nextQuestion()" disabled data-zh="下一题" data-en="Next Question">下一题</button>
                </div>
            </div>

            <!-- 结果界面 -->
            <div id="resultCard" class="result-card">
                <div class="result-score" id="finalScore"></div>
                <div class="result-message" id="resultMessage"></div>
                <button class="quiz-btn" onclick="restartQuiz()" data-zh="重新挑战" data-en="Try Again">重新挑战</button>
            </div>
        </div>
    </div>

    <script>
        function createMagicParticles() {
            const container = document.querySelector('.magic-particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(particle);
            }
        }
        createMagicParticles();

        function goBack() {
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.8s ease-in-out';
            setTimeout(() => {
                window.location.href = 'academy.html';
            }, 800);
        }

        // 测试数据

                {

                    options: ["5本", "6本", "7本", "8本"],
                    optionsEn: ["5 books", "6 books", "7 books", "8 books"],
                    correct: 2,
                    explanation: "文中明确指出截至2008年，系列7本小说被翻译成67种文字。",
                    explanationEn: "The text explicitly states that as of 2008, 7 books in the series were translated into 67 languages."
                },
                {
                    question: "哈利·波特住在女贞路几号？",
                    questionEn: "What number does Harry Potter live at on Privet Drive?",
                    options: ["2号", "4号", "9¾号", "10号"],
                    optionsEn: ["Number 2", "Number 4", "Number 9¾", "Number 10"],

                    optionsEn: ["500 Galleons", "700 Galleons", "1000 Galleons", "100 Galleons"],

                {

                {

                    options: ["1号", "2号", "3号", "纯金标准尺寸"],

                {

                    questionEn: "When Harry first returned to the Dursleys for summer break, what precious flying equipment did Uncle Vernon lock in the cupboard under the stairs?",

                {

                    questionEn: "What did Aunt Marge say was the cause of Harry's parents' death according to the Dursleys' lie?",
                    options: ["飞机失事", "被谋杀", "车祸", "生病去世"],
                    optionsEn: ["A plane crash", "They were murdered", "A car crash", "They died of illness"],
                    correct: 2,
                    explanation: "玛姬姑妈坚称他们出门遇到车祸死了，并猜测他们喝醉了。",
                    explanationEn: "Aunt Marge insisted they died in a car crash and speculated they were drunk."
                },
                {
                    question: "在《哈利·波特与死亡圣器》的目录中，第19章的标题是什么？",
                    questionEn: "In the table of contents for Deathly Hallows, what is the title of Chapter 19?",
                    options: ["银色的牝鹿", "死亡圣器", "三兄弟的传说", "王子的故事"],
                    optionsEn: ["The Silver Doe", "The Deathly Hallows", "The Tale of the Three Brothers", "The Prince's Tale"],
                    correct: 0,
                    explanation: "目录中清晰列出第19章为银色的牝鹿。",
                    explanationEn: "The table of contents clearly lists Chapter 19 as The Silver Doe."
                }
            ]
        };

        let currentDifficulty = 'easy';
        let currentQuestion = 0;
        let score = 0;
        let answered = false;
        let currentLanguage = 'zh'; // 'zh' for Chinese, 'en' for English

        // Language strings
        const translations = {
            zh: {
                backBtn: '← 返回大厅',
                langBtn: 'English',
                pageTitle: '⚡ 魔法测试 ⚡',
                pageSubtitle: 'Test Your Magical Knowledge',
                pageInfo: '初级挑战30题 | 中级挑战5题 | 高级挑战30题',
                question: '问题',
                challenge: '挑战',
                explanationTitle: '📖 答案解析',
                noExplanation: '暂无解析',
                perfect: '🏆 完美！你是真正的魔法大师！',
                excellent: '⚡ 优秀！你是一名出色的巫师！',
                good: '✨ 不错！继续学习魔法知识！',
                needPractice: '📚 需要更多练习，加油！'
            },
            en: {
                backBtn: '← Back to Academy',
                langBtn: '中文',
                pageTitle: '⚡ Magic Quiz ⚡',
                pageSubtitle: 'Test Your Magical Knowledge',
                pageInfo: 'Easy: 30 | Medium: 5 | Hard: 30',
                question: 'Question',
                challenge: 'Challenge',
                explanationTitle: '📖 Explanation',
                noExplanation: 'No explanation available',
                perfect: '🏆 Perfect! You are a true magic master!',
                excellent: '⚡ Excellent! You are an outstanding wizard!',
                good: '✨ Good! Keep learning magic!',
                needPractice: '📚 Need more practice, keep going!'
            }
        };

        function toggleLanguage() {
            currentLanguage = currentLanguage === 'zh' ? 'en' : 'zh';
            updateLanguage();

            // If quiz is in progress, refresh current question
            if (document.getElementById('quizInterface').style.display === 'block') {
                showQuestion();
            }
        }

        function updateLanguage() {
            const t = translations[currentLanguage];

            // Update main page elements
            document.getElementById('backBtn').textContent = t.backBtn;
            document.getElementById('langBtn').textContent = t.langBtn;
            document.getElementById('pageTitle').textContent = t.pageTitle;
            document.getElementById('pageSubtitle').textContent = t.pageSubtitle;
            document.getElementById('pageInfo').textContent = t.pageInfo;

            // Update difficulty cards
            document.querySelectorAll('[data-zh]').forEach(el => {
                el.textContent = el.getAttribute(`data-${currentLanguage}`);
            });

            // Update buttons
            document.querySelectorAll('[data-zh]').forEach(el => {
                if (el.tagName === 'BUTTON') {
                    el.textContent = el.getAttribute(`data-${currentLanguage}`);
                }
            });
        }

        function getQuestionText(q) {
            return currentLanguage === 'zh' ? q.question : (q.questionEn || q.question);
        }

        function getOptionText(option, index, q) {
            if (currentLanguage === 'zh') {
                return option;
            }
            return q.optionsEn ? q.optionsEn[index] : option;
        }

        function getExplanationText(q) {
            if (currentLanguage === 'zh') {
                return q.explanation || translations[currentLanguage].noExplanation;
            }
            return q.explanationEn || q.explanation || translations[currentLanguage].noExplanation;
        }

        function startQuiz(difficulty) {
            currentDifficulty = difficulty;
            currentQuestion = 0;
            score = 0;
            answered = false;

            document.getElementById('difficultySelection').style.display = 'none';
            document.getElementById('quizInterface').style.display = 'block';
            document.getElementById('resultCard').style.display = 'none';

            showQuestion();
        }

        function showQuestion() {
            const questions = quizData[currentDifficulty];
            const q = questions[currentQuestion];

            const t = translations[currentLanguage];
            const challengeName = currentDifficulty === 'easy' ? (currentLanguage === 'zh' ? '初级' : 'Easy') :
                                  currentDifficulty === 'medium' ? (currentLanguage === 'zh' ? '中级' : 'Medium') :
                                  (currentLanguage === 'zh' ? '高级' : 'Hard');

            document.getElementById('progressText').textContent =
                `${t.question} ${currentQuestion + 1} / ${questions.length} (${challengeName} ${t.challenge})`;

            const questionCard = document.querySelector('.question-card');
            questionCard.innerHTML = `
                <div class="question-header">
                    <span class="question-number">${currentLanguage === 'zh' ? '第' : ''} ${currentQuestion + 1} ${t.question}</span>
                </div>
                <div class="question-text">${getQuestionText(q)}</div>
                <div id="optionsGrid" class="options-grid"></div>
                <div id="explanation" class="explanation">
                    <h4>${t.explanationTitle}</h4>
                    <p>${getExplanationText(q)}</p>
                </div>
            `;

            const optionsGrid = document.getElementById('optionsGrid');
            q.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = getOptionText(option, index, q);
                btn.onclick = () => selectAnswer(index);
                optionsGrid.appendChild(btn);
            });

            // Update next button text
            document.getElementById('nextBtn').textContent =
                document.getElementById('nextBtn').getAttribute(`data-${currentLanguage}`);

            document.getElementById('nextBtn').disabled = true;
            answered = false;
        }

        function selectAnswer(index) {
            if (answered) return;
            answered = true;

            const questions = quizData[currentDifficulty];
            const q = questions[currentQuestion];
            const options = document.querySelectorAll('.option-btn');

            options.forEach((btn, i) => {
                btn.style.pointerEvents = 'none';
                if (i === q.correct) {
                    btn.classList.add('correct');
                } else if (i === index) {
                    btn.classList.add('incorrect');
                }
            });

            if (index === q.correct) {
                score++;
            }

            const explanation = document.getElementById('explanation');
            if (explanation && (q.explanation || q.explanationEn)) {
                explanation.classList.add('show');
            }

            document.getElementById('nextBtn').disabled = false;
        }

        function nextQuestion() {
            const questions = quizData[currentDifficulty];
            currentQuestion++;

            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quizInterface').style.display = 'none';
            document.getElementById('resultCard').style.display = 'block';

            const questions = quizData[currentDifficulty];
            const percentage = (score / questions.length) * 100;

            document.getElementById('finalScore').textContent = `${score} / ${questions.length}`;

            const t = translations[currentLanguage];
            let message = '';
            if (percentage === 100) {
                message = t.perfect;
            } else if (percentage >= 80) {
                message = t.excellent;
            } else if (percentage >= 60) {
                message = t.good;
            } else {
                message = t.needPractice;
            }

            document.getElementById('resultMessage').textContent = message;

            // Update restart button
            const restartBtn = document.querySelector('#resultCard .quiz-btn');
            if (restartBtn) {
                restartBtn.textContent = restartBtn.getAttribute(`data-${currentLanguage}`);
            }
        }

        function restartQuiz() {
            document.getElementById('resultCard').style.display = 'none';
            document.getElementById('difficultySelection').style.display = 'grid';
        }
    </script>
</body>
</html>
