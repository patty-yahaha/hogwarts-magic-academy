<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>变形课 - 霍格沃茨魔法学院</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="academy.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        /* 变形课页面样式 */
        .transfiguration-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px 15px;
        }

        .transfiguration-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .page-title {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 2rem;
            color: #d4af37;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .back-btn {
            background: linear-gradient(135deg, #2a1a3e, #1a1a3e);
            border: 2px solid #d4af37;
            color: #d4af37;
            padding: 10px 20px;
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            letter-spacing: 2px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2);
        }

        .back-btn:hover {
            background: linear-gradient(135deg, #1a1a3e, #2a1a3e);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4);
        }

        /* 游戏介绍区域 */
        .game-intro {
            background: linear-gradient(145deg, rgba(20, 30, 50, 0.95), rgba(10, 20, 40, 0.98));
            border: 3px solid rgba(212, 175, 55, 0.4);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .intro-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            text-align: center;
        }

        .intro-title {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 1.5rem;
            color: #d4af37;
            margin-bottom: 12px;
            text-align: center;
        }

        .intro-description {
            color: #c9a227;
            font-family: 'MedievalSharp', cursive;
            font-size: 1rem;
            line-height: 1.4;
            margin-bottom: 20px;
            text-align: center;
        }

        /* 模式选择器 */
        .mode-selector-intro {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .mode-btn-intro {
            background: linear-gradient(135deg, #2a1a3e, #1a1a3e);
            border: 2px solid #d4af37;
            color: #d4af37;
            padding: 15px 25px;
            border-radius: 15px;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 180px;
        }

        .mode-btn-intro:hover {
            background: linear-gradient(135deg, #d4af37, #c9a227);
            color: #1a1a3e;
            transform: translateY(-2px);
        }

        .mode-btn-intro.active {
            background: linear-gradient(135deg, #d4af37, #c9a227);
            color: #1a1a3e;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .mode-btn-intro small {
            display: block;
            font-size: 0.8rem;
            opacity: 0.8;
            margin-top: 5px;
        }

        /* 规则说明 */
        .rules-section-intro {
            background: rgba(212, 175, 55, 0.05);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .rules-title-intro {
            color: #d4af37;
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
        }

        .rules-list-intro {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .rule-item-intro {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 8px;
            background: rgba(212, 175, 55, 0.03);
            border-radius: 8px;
        }

        .rule-icon-intro {
            font-size: 1rem;
            font-weight: bold;
            min-width: 24px;
            text-align: center;
            flex-shrink: 0;
        }

        .rule-text-intro {
            color: #c9a227;
            font-family: 'MedievalSharp', cursive;
            font-size: 0.9rem;
            line-height: 1.4;
            flex: 1;
        }

        .start-game-btn {
            background: linear-gradient(145deg, #d4af37, #c9a227);
            color: #1a1a3e;
            border: none;
            padding: 15px 50px;
            font-size: 1.2rem;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4);
            display: block;
            margin: 0 auto;
        }

        .start-game-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(212, 175, 55, 0.6);
        }

        /* 游戏模态框 */
        .game-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .game-modal.show {
            display: flex;
        }

        .game-modal-content {
            background: linear-gradient(145deg, rgba(20, 30, 50, 0.98), rgba(10, 20, 40, 0.98));
            border: 3px solid #d4af37;
            border-radius: 20px;
            padding: 15px 20px;
            max-width: 950px;
            width: 95%;
            max-height: 95vh;
            overflow-y: auto;
            position: relative;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(212, 175, 55, 0.3);
        }

        .game-title {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 1.3rem;
            color: #d4af37;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        .game-close-btn {
            background: linear-gradient(135deg, #d4af37, #c9a227);
            color: #1a1a3e;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-close-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
        }

        /* 倒计时显示 */
        .timer-display-game {
            text-align: center;
            margin-bottom: 10px;
        }

        .timer-text-game {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            color: #e74c3c;
            text-shadow: 0 0 12px rgba(231, 76, 60, 0.6);
        }

        .timer-text-game.warning {
            animation: timerPulse 0.5s ease-in-out infinite;
        }

        @keyframes timerPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* 游戏主区域 */
        .transfiguration-game-area {
            display: flex;
            gap: 15px;
        }

        .transfiguration-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* 老师区域 */
        .teacher-section {
            background: linear-gradient(145deg, rgba(20, 30, 50, 0.95), rgba(10, 20, 40, 0.98));
            border: 2px solid rgba(212, 175, 55, 0.4);
            border-radius: 15px;
            padding: 12px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .teacher-avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(145deg, #d4af37, #f4e4ba);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            flex-shrink: 0;
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4);
        }

        .dialogue-bubble {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15), rgba(201, 162, 39, 0.1));
            border: 2px solid rgba(212, 175, 55, 0.4);
            border-radius: 10px;
            padding: 10px 12px;
            position: relative;
            flex: 1;
        }

        .dialogue-bubble::before {
            content: '';
            position: absolute;
            left: -10px;
            top: 20px;
            border: 6px solid transparent;
            border-right-color: rgba(212, 175, 55, 0.4);
        }

        .dialogue-text {
            color: #d4af37;
            font-family: 'MedievalSharp', cursive;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        /* 进度指示器 */
        .progress-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .progress-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #333;
            border: 2px solid #d4af37;
            transition: all 0.3s ease;
        }

        .progress-dot.completed {
            background: #27ae60;
            border-color: #2ecc71;
        }

        .progress-dot.current {
            background: #d4af37;
            animation: dotPulse 1s ease-in-out infinite;
        }

        @keyframes dotPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* 画板区域 */
        .canvas-section {
            background: linear-gradient(145deg, rgba(20, 30, 50, 0.95), rgba(10, 20, 40, 0.98));
            border: 2px solid rgba(212, 175, 55, 0.4);
            border-radius: 15px;
            padding: 15px;
        }

        .canvas-container {
            background: #1a1a1a;
            border: 4px solid #8b4513;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.5);
        }

        #transfigurationCanvas {
            display: block;
            width: 100%;
            height: 240px;
            cursor: crosshair;
        }

        /* 按钮区域 */
        .button-section {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .action-btn {
            background: linear-gradient(135deg, #d4af37, #c9a227);
            border: 2px solid #ffd700;
            color: #1a1a3e;
            padding: 10px 20px;
            border-radius: 10px;
            font-family: 'Cinzel', serif;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .action-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #ffd700, #d4af37);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.5);
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .action-btn.secondary {
            background: linear-gradient(135deg, #666, #888);
            border: 2px solid #aaa;
            color: white;
        }

        .action-btn.secondary:hover:not(:disabled) {
            background: linear-gradient(135deg, #888, #aaa);
            box-shadow: 0 5px 15px rgba(100, 100, 100, 0.5);
        }

        /* 评分区域 */
        .score-section {
            background: linear-gradient(145deg, rgba(20, 30, 50, 0.95), rgba(10, 20, 40, 0.98));
            border: 2px solid rgba(212, 175, 55, 0.4);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
        }

        .score-title {
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            color: #d4af37;
            margin-bottom: 10px;
        }

        .stars-display {
            font-size: 2rem;
            margin-bottom: 8px;
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        }

        .comment-text {
            color: #c9a227;
            font-family: 'MedievalSharp', cursive;
            font-size: 0.95rem;
            margin-bottom: 5px;
        }

        .score-detail {
            color: #888;
            font-size: 0.8rem;
            margin-top: 8px;
        }

        /* 状态面板 */
        .status-panel {
            width: 200px;
            background: linear-gradient(145deg, rgba(20, 30, 50, 0.95), rgba(10, 20, 40, 0.98));
            border: 2px solid rgba(212, 175, 55, 0.4);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .status-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background: rgba(212, 175, 55, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .status-label {
            color: #c9a227;
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
        }

        .status-value {
            color: #d4af37;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* 隐藏初始状态 */
        .hidden {
            display: none !important;
        }

        /* 响应式设计 */
        @media (max-width: 900px) {
            .transfiguration-game-area {
                flex-direction: column;
            }

            .status-panel {
                width: 100%;
                flex-direction: row;
                flex-wrap: wrap;
            }

            .teacher-section {
                flex-direction: column;
                align-items: center;
            }

            .teacher-avatar {
                width: 70px;
                height: 70px;
                font-size: 2.2rem;
            }

            .dialogue-bubble::before {
                left: 50%;
                top: -12px;
                border: 8px solid transparent;
                border-bottom-color: rgba(212, 175, 55, 0.4);
                transform: translateX(-50%);
            }

            #transfigurationCanvas {
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="stars-bg"></div>
    <div class="magic-particles"></div>

    <div class="container">
        <div class="transfiguration-container">
            <!-- 顶部 -->
            <div class="transfiguration-header">
                <button class="back-btn" onclick="goBack()">← 返回大厅</button>
                <h1 class="page-title">✨ 变形课 ✨</h1>
            </div>

            <!-- 介绍页面 -->
            <div id="introPage">
                <div class="game-intro">
                    <div class="intro-icon">🧙‍♀️</div>
                    <div class="intro-title">麦格教授的变形课</div>
                    <div class="intro-description">
                        欢迎来到变形课！今天我们将学习如何将火柴变成银针。<br>
                        选择一种模式，开始你的变形术练习吧！
                    </div>

                    <!-- 模式选择器 -->
                    <div class="mode-selector-intro">
                        <button class="mode-btn-intro active" onclick="selectMode('basic')" id="intro-btn-basic">
                            📍 基础模式
                            <small>10秒/关，画一根给一次反馈</small>
                        </button>
                        <button class="mode-btn-intro" onclick="selectMode('sequential')" id="intro-btn-sequential">
                            🔗 多根火柴
                            <small>20秒/关，依次出现</small>
                        </button>
                        <button class="mode-btn-intro" onclick="selectMode('moving')" id="intro-btn-moving">
                            🏃 移动火柴
                            <small>30秒/关，预判位置</small>
                        </button>
                    </div>

                    <!-- 规则说明 -->
                    <div class="rules-section-intro" id="rulesSectionIntro">
                        <div class="rules-title-intro">📜 玩法说明</div>
                        <div class="rules-list-intro" id="rulesListIntro">
                            <div class="rule-item-intro">
                                <span class="rule-icon-intro">1️⃣</span>
                                <span class="rule-text-intro">选择模式后点击"开始挑战"按钮</span>
                            </div>
                            <div class="rule-item-intro">
                                <span class="rule-icon-intro">2️⃣</span>
                                <span class="rule-text-intro">在画板上沿着火柴画出银针的形状</span>
                            </div>
                            <div class="rule-item-intro">
                                <span class="rule-icon-intro">3️⃣</span>
                                <span class="rule-text-intro">基础模式多根火柴同时出现，多根模式依次出现</span>
                            </div>
                            <div class="rule-item-intro">
                                <span class="rule-icon-intro">4️⃣</span>
                                <span class="rule-text-intro">获得60分以上即可成功变形！</span>
                            </div>
                        </div>
                    </div>

                    <button class="start-game-btn" onclick="startGame()">开始挑战</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 游戏模态框 -->
    <div class="game-modal" id="gameModal">
        <div class="game-modal-content">
            <div class="game-header">
                <span class="game-title" id="gameTitle">📍 基础模式 - 第1关</span>
                <button class="game-close-btn" onclick="closeGame()">✕</button>
            </div>

            <!-- 倒计时显示 -->
            <div class="timer-display-game hidden" id="timerDisplayGame">
                <span class="timer-text-game" id="timerTextGame">10</span>
            </div>

            <!-- 游戏区域 -->
            <div class="transfiguration-game-area">
                <!-- 主区域 -->
                <div class="transfiguration-main">
                    <!-- 老师区域 -->
                    <div class="teacher-section">
                        <div class="teacher-avatar">🧙‍♀️</div>
                        <div class="teacher-info">
                            <div class="teacher-name">米勒娃·麦格教授 (Professor McGonagall)</div>
                        </div>
                        <div class="dialogue-bubble">
                            <p class="dialogue-text" id="teacherDialogue">
                                开始！沿着火柴画出银针！
                            </p>
                        </div>
                    </div>

                    <!-- 进度指示器 -->
                    <div class="progress-indicator hidden" id="progressIndicator">
                        <div class="progress-dot" id="dot-1"></div>
                        <div class="progress-dot" id="dot-2"></div>
                        <div class="progress-dot" id="dot-3"></div>
                    </div>

                    <!-- 画板区域 -->
                    <div class="canvas-section">
                        <div class="canvas-container">
                            <canvas id="transfigurationCanvas"></canvas>
                        </div>
                    </div>

                    <!-- 按钮区域 -->
                    <div class="button-section">
                        <button class="action-btn hidden" onclick="clearCanvas()" id="btn-clear">清除重画</button>
                        <button class="action-btn hidden" onclick="retryLevel()" id="btn-retry">重试本关</button>
                        <button class="action-btn hidden" onclick="nextLevel()" id="btn-nextLevel">下一关</button>
                    </div>

                    <!-- 评分区域 -->
                    <div class="score-section">
                        <div class="score-title">变形评分</div>
                        <div class="stars-display" id="starsDisplay">⭐⭐⭐⭐⭐</div>
                        <div class="comment-text" id="commentText">准备开始你的变形术</div>
                        <div class="score-detail hidden" id="scoreDetail"></div>
                    </div>
                </div>

                <!-- 状态面板 -->
                <div class="status-panel">
                    <div class="status-item">
                        <span class="status-label">❤️ 好感度</span>
                        <span class="status-value" id="favorabilityDisplay">0</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">🪙 金币</span>
                        <span class="status-value" id="coinsDisplay">0</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">🔥 关卡</span>
                        <span class="status-value" id="levelDisplay">1</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">🎮 模式</span>
                        <span class="status-value" id="modeDisplay">基础</span>
                    </div>
                    <div class="status-item hidden" id="matchstickCountItem">
                        <span class="status-label">🔥 火柴</span>
                        <span class="status-value" id="matchstickCountDisplay">1/3</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/coin-manager.js"></script>
    <script>
        // 游戏状态
        let gameState = {
            mode: 'basic', // basic, sequential, moving
            level: 1,
            totalMatchsticks: 1,
            completedMatchsticks: 0,
            matchsticks: [],
            isDrawing: false,
            currentPath: [],
            completedPaths: [], // 基础模式中已完成的火柴路径
            currentTargetIndex: null, // 当前正在画的火柴索引（基础模式）
            streak: 0,
            favorability: 0,
            sessionCoins: 0,
            timeLimit: 10,
            remainingTime: 10,
            timerInterval: null,
            isPlaying: false,
            levelCompleted: false,
            modeCompleted: { basic: false, sequential: false, moving: false },
            movingAnimation: null,
            matchstickStartTime: null
        };

        // 各模式配置
        const modeConfig = {
            basic: {
                name: '基础',
                displayName: '📍 基础模式',
                timeLimit: 10,
                matchstickCounts: [1, 2, 3],
                reward: 5
            },
            sequential: {
                name: '多根火柴',
                displayName: '🔗 多根火柴',
                timeLimit: 20,
                matchstickCounts: [3, 4, 5],
                reward: 10
            },
            moving: {
                name: '移动火柴',
                displayName: '🏃 移动火柴',
                timeLimit: 30,
                matchstickCounts: [1, 3, 5],
                reward: 15
            }
        };

        // Canvas 相关
        const canvas = document.getElementById('transfigurationCanvas');
        let ctx = null;

        // 初始化 canvas
        function initCanvas() {
            if (!ctx) {
                ctx = canvas.getContext('2d');
            }
            const container = document.querySelector('.canvas-container');
            canvas.width = container.clientWidth;
            canvas.height = 240;
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            if (window.CoinManager) {
                CoinManager.initialize();
            }

            setupEventListeners();
            loadGameState();
            updateDisplays();
        });

        // 设置事件监听器
        function setupEventListeners() {
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseleave', stopDrawing);
            canvas.addEventListener('touchstart', startDrawing);
            canvas.addEventListener('touchmove', draw);
            canvas.addEventListener('touchend', stopDrawing);
        }

        // 开始游戏
        function startGame() {
            gameState.level = 1;
            gameState.completedMatchsticks = 0;
            gameState.isPlaying = false;
            gameState.levelCompleted = false;

            document.getElementById('introPage').style.display = 'none';
            document.getElementById('gameModal').classList.add('show');

            initCanvas();
            updateGameTitle();
            startChallenge();
        }

        // 关闭游戏
        function closeGame() {
            if (gameState.isPlaying) {
                stopChallenge();
            }
            document.getElementById('gameModal').classList.remove('show');
            document.getElementById('introPage').style.display = 'block';
            resetGameUI();
        }

        // 更新游戏标题
        function updateGameTitle() {
            const config = modeConfig[gameState.mode];
            document.getElementById('gameTitle').textContent =
                `${config.displayName} - 第${gameState.level}关`;
        }

        // 开始挑战
        function startChallenge() {
            gameState.isPlaying = true;
            gameState.levelCompleted = false;
            gameState.completedMatchsticks = 0;
            gameState.currentPath = [];
            gameState.completedPaths = []; // 重置已完成路径
            gameState.currentTargetIndex = null; // 重置当前目标

            initLevel();
            startTimer();

            if (gameState.mode === 'moving') {
                startMovingMatchstick();
            }

            updateGameUI();
            drawCanvas();
            showMessage('开始！沿着火柴画出银针！');
        }

        // 初始化关卡
        function initLevel() {
            const config = modeConfig[gameState.mode];
            gameState.totalMatchsticks = config.matchstickCounts[gameState.level - 1];
            gameState.timeLimit = config.timeLimit;
            gameState.remainingTime = config.timeLimit;
            gameState.currentPath = [];
            gameState.completedMatchsticks = 0;
            gameState.completedPaths = [];
            gameState.currentTargetIndex = null;

            initMatchsticks();
            updateProgressIndicator();
            updateGameTitle();
        }

        // 初始化火柴
        function initMatchsticks() {
            gameState.matchsticks = [];
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const count = gameState.totalMatchsticks;

            if (gameState.mode === 'basic') {
                // 基础模式所有火柴同时出现
                if (count === 1) {
                    gameState.matchsticks.push(createMatchstick(centerX - 40, centerY - 5));
                } else if (count === 2) {
                    gameState.matchsticks.push(createMatchstick(centerX - 100, centerY - 40));
                    gameState.matchsticks.push(createMatchstick(centerX + 20, centerY + 30));
                } else if (count === 3) {
                    gameState.matchsticks.push(createMatchstick(centerX - 40, centerY - 70));
                    gameState.matchsticks.push(createMatchstick(centerX - 100, centerY + 40));
                    gameState.matchsticks.push(createMatchstick(centerX + 20, centerY + 40));
                }
            } else if (gameState.mode === 'sequential') {
                // 顺序模式每次只显示一根火柴
                gameState.matchsticks.push(createMatchstick(centerX - 40, centerY - 5));
            } else if (gameState.mode === 'moving') {
                // 移动模式：随机位置移动，距离不超过一根火柴
                const matchstickLength = 80; // 火柴长度
                const maxMoveDistance = matchstickLength; // 最大移动距离不超过火柴长度

                // 随机起始位置（在画布可见区域内）
                const startX = Math.random() * (canvas.width - matchstickLength) + matchstickLength / 2;
                const startY = Math.random() * (canvas.height - matchstickLength) + matchstickLength / 2;

                // 随机移动方向
                const angle = Math.random() * Math.PI * 2;
                const moveDistance = Math.random() * maxMoveDistance;

                const endX = startX + Math.cos(angle) * moveDistance;
                const endY = startY + Math.sin(angle) * moveDistance;

                // 确保结束位置也在可见区域内
                const clampedEndX = Math.max(matchstickLength / 2, Math.min(canvas.width - matchstickLength / 2, endX));
                const clampedEndY = Math.max(matchstickLength / 2, Math.min(canvas.height - matchstickLength / 2, endY));

                // 创建火柴
                const matchstick = createMatchstick(startX - matchstickLength / 2, startY - 5);
                matchstick.startX = startX - matchstickLength / 2; // 火柴左端x坐标
                matchstick.startY = startY - 5; // 火柴y坐标
                matchstick.endX = clampedEndX - matchstickLength / 2; // 结束位置左端x坐标
                matchstick.endY = clampedEndY - 5; // 结束位置y坐标

                gameState.matchsticks.push(matchstick);
            }
        }

        // 创建单个火柴
        function createMatchstick(x, y) {
            return {
                x: x,
                y: y,
                width: 80,
                height: 10,
                id: `matchstick-${Date.now()}`
            };
        }

        // 开始计时器
        function startTimer() {
            // 确保之前的计时器已清除
            if (gameState.timerInterval) {
                clearInterval(gameState.timerInterval);
                gameState.timerInterval = null;
            }

            const startTime = Date.now();
            updateTimerDisplay();
            document.getElementById('timerDisplayGame').classList.remove('hidden');

            gameState.timerInterval = setInterval(() => {
                // 确保只有在游戏进行中才倒计时
                if (gameState.isPlaying) {
                    const elapsed = (Date.now() - startTime) / 1000;
                    gameState.remainingTime = Math.max(0, gameState.timeLimit - elapsed);
                    updateTimerDisplay();

                    if (gameState.remainingTime <= 0) {
                        handleTimeout();
                    }
                }
            }, 100);
        }

        // 更新计时器显示
        function updateTimerDisplay() {
            const timerText = document.getElementById('timerTextGame');
            const displayTime = Math.ceil(gameState.remainingTime);
            timerText.textContent = displayTime;

            if (displayTime <= 3) {
                timerText.classList.add('warning');
            } else {
                timerText.classList.remove('warning');
            }
        }

        // 处理超时
        function handleTimeout() {
            stopChallenge();
            // 好感度：超时未完成绘画→ -2 好感度
            gameState.favorability = Math.max(0, gameState.favorability - 2);
            saveAffection(gameState.favorability);
            updateDisplays();
            showMessage('时间到！挑战失败，再试一次吧！', 'error');
            document.getElementById('btn-retry').classList.remove('hidden');
        }

        // 停止挑战
        function stopChallenge() {
            gameState.isPlaying = false;
            if (gameState.timerInterval) {
                clearInterval(gameState.timerInterval);
                gameState.timerInterval = null;
            }
            if (gameState.movingAnimation) {
                cancelAnimationFrame(gameState.movingAnimation);
                gameState.movingAnimation = null;
            }
            document.getElementById('timerDisplayGame').classList.add('hidden');
        }

        // 开始移动火柴
        function startMovingMatchstick() {
            if (!gameState.matchsticks[0]) return;

            const matchstick = gameState.matchsticks[0];
            matchstick.x = matchstick.startX;
            gameState.matchstickStartTime = Date.now();
            gameState.currentPath = [];

            animateMovingMatchstick();
        }

        // 移动火柴动画
        function animateMovingMatchstick() {
            if (!gameState.isPlaying) return;

            const matchstick = gameState.matchsticks[0];
            const elapsed = (Date.now() - gameState.matchstickStartTime) / 1000;
            const progress = Math.min(elapsed / 3, 1); // 缩短动画时间到3秒

            // 同时更新x和y坐标
            matchstick.x = matchstick.startX + progress * (matchstick.endX - matchstick.startX);
            matchstick.y = matchstick.startY + progress * (matchstick.endY - matchstick.startY);

            drawCanvas();

            if (progress < 1) {
                gameState.movingAnimation = requestAnimationFrame(animateMovingMatchstick);
            } else {
                handleMovingMatchstickEnd();
            }
        }

        // 处理移动火柴结束
        function handleMovingMatchstickEnd() {
            if (gameState.currentPath.length < 10) {
                stopChallenge();
                showMessage('火柴消失了！你还没画线，挑战失败！', 'error');
                document.getElementById('btn-retry').classList.remove('hidden');
            } else {
                // 移动结束后将火柴定位到最终位置
                const matchstick = gameState.matchsticks[0];
                matchstick.x = matchstick.endX;
                matchstick.y = matchstick.endY;
                const score = calculateScore();
                handleScore(score);
            }
        }

        // 开始绘制
        function startDrawing(e) {
            if (!gameState.isPlaying) return;

            gameState.isDrawing = true;
            gameState.currentPath = [];

            const rect = canvas.getBoundingClientRect();
            let x, y;

            if (e.touches) {
                x = e.touches[0].clientX - rect.left;
                y = e.touches[0].clientY - rect.top;
            } else {
                x = e.clientX - rect.left;
                y = e.clientY - rect.top;
            }

            gameState.currentPath.push({ x, y });

            // 在基础模式中，确定当前正在画的是哪一根火柴
            if (gameState.mode === 'basic') {
                gameState.currentTargetIndex = findNearestMatchstick(x, y);
            }
        }

        // 绘制
        function draw(e) {
            if (!gameState.isDrawing || !gameState.isPlaying) return;

            e.preventDefault();

            const rect = canvas.getBoundingClientRect();
            let x, y;

            if (e.touches) {
                x = e.touches[0].clientX - rect.left;
                y = e.touches[0].clientY - rect.top;
            } else {
                x = e.clientX - rect.left;
                y = e.clientY - rect.top;
            }

            gameState.currentPath.push({ x, y });
            drawCanvas();
        }

        // 找到最近的火柴（基础模式）
        function findNearestMatchstick(x, y) {
            let minDistance = Infinity;
            let nearestIndex = 0;

            gameState.matchsticks.forEach((matchstick, index) => {
                // 计算火柴中心点
                const centerX = matchstick.x + matchstick.width / 2;
                const centerY = matchstick.y + matchstick.height / 2;

                const distance = Math.sqrt(Math.pow(x - centerX, 2) + Math.pow(y - centerY, 2));

                if (distance < minDistance) {
                    minDistance = distance;
                    nearestIndex = index;
                }
            });

            return nearestIndex;
        }

        // 检查路径是否主要覆盖在某根火柴上（基础模式）
        function isPathOnMatchstick(path, matchstick) {
            let pointsOn = 0;

            for (let i = 0; i < path.length; i += Math.floor(path.length / 5)) {
                const point = path[i];

                // 检查点是否在火柴的边界框内（稍微扩大边界）
                const tolerance = 15; // 火柴高度的1.5倍
                if (point.x >= matchstick.x - tolerance &&
                    point.x <= matchstick.x + matchstick.width + tolerance &&
                    point.y >= matchstick.y - tolerance &&
                    point.y <= matchstick.y + matchstick.height + tolerance) {
                    pointsOn++;
                }
            }

            return pointsOn >= 3; // 至少5个采样点中有3个在范围内
        }

        // 停止绘制
        function stopDrawing() {
            if (!gameState.isDrawing || !gameState.isPlaying) return;
            gameState.isDrawing = false;

            if (gameState.currentPath.length > 10) {
                if (gameState.mode !== 'moving') {
                    if (gameState.mode === 'basic') {
                        // 基础模式：确定当前画的是哪一根火柴
                        if (gameState.currentTargetIndex === null) {
                            // 如果没有目标（通常不会发生），找到最近的火柴
                            const lastPoint = gameState.currentPath[gameState.currentPath.length - 1];
                            gameState.currentTargetIndex = findNearestMatchstick(lastPoint.x, lastPoint.y);
                        }

                        const targetMatchstick = gameState.matchsticks[gameState.currentTargetIndex];

                        // 检查路径是否主要覆盖在目标火柴上
                        if (isPathOnMatchstick(gameState.currentPath, targetMatchstick)) {
                            // 使用临时保存的方式计算评分
                            const savedPath = gameState.currentPath;
                            const score = calculateScoreForSingleMatchstick(gameState.currentTargetIndex);
                            handleBasicModeScore(score);
                        } else {
                            showMessage('你的线条离火柴太远了！请沿着火柴画', 'error');
                            document.getElementById('btn-clear').classList.remove('hidden');
                        }
                    } else {
                        // 其他模式：单根火柴直接评分
                        const score = calculateScore();
                        handleScore(score);
                    }
                }
            }
        }

        // 处理基础模式评分
        function handleBasicModeScore(score) {
            updateScoreDisplay(score);

            const professorComment = getProfessorComment(score);
            const matchIndex = gameState.currentTargetIndex;

            if (score >= 60) {
                // 播放变形动画（仅对当前火柴）
                playTransfigurationAnimation(matchIndex);

                // 检查这根火柴是否已经完成过
                const isAlreadyCompleted = gameState.completedPaths.some(p => p.matchIndex === matchIndex);

                if (!isAlreadyCompleted) {
                    gameState.completedPaths.push({
                        matchIndex: matchIndex,
                        path: [...gameState.currentPath],
                        score: score
                    });
                    gameState.completedMatchsticks = gameState.completedPaths.length;
                }

                // 好感度：单次绘画满分100分（完美）→ 额外 +5 好感度
                if (score === 100) {
                    gameState.favorability += 5;
                    saveAffection(gameState.favorability);
                    updateDisplays();
                    showMessage(`太棒了！满分！麦格教授好感度+5！`, 'success');
                }

                gameState.streak++;
                gameState.currentPath = []; // 清空当前路径
                gameState.currentTargetIndex = null; // 重置目标

                setTimeout(() => {
                    updateProgressIndicator();

                    if (gameState.completedMatchsticks >= gameState.totalMatchsticks) {
                        completeLevel();
                    } else {
                        showMessage(`${professorComment} 第 ${matchIndex + 1} 根火柴成功！继续画剩下的！`);
                    }
                }, 1500);
            } else {
                // 好感度：单次得分 <60 分（变形失败）→ -2 好感度
                gameState.favorability = Math.max(0, gameState.favorability - 2);
                saveAffection(gameState.favorability);
                updateDisplays();

                gameState.streak = 0;
                document.getElementById('btn-clear').classList.remove('hidden');
                showMessage(`${professorComment} 第 ${matchIndex + 1} 根火柴没通过！重画这根吧！`, 'error');
            }

            drawCanvas();
        }

        // 处理评分
        function handleScore(score) {
            updateScoreDisplay(score);

            const professorComment = getProfessorComment(score);
            showMessage(professorComment);

            if (score >= 60) {
                // 播放变形动画
                playTransfigurationAnimation();

                // 好感度：单次绘画满分100分（完美）→ 额外 +5 好感度
                if (score === 100) {
                    gameState.favorability += 5;
                    saveAffection(gameState.favorability);
                    updateDisplays();
                }

                gameState.streak++;

                setTimeout(() => {
                    if (gameState.mode === 'sequential') {
                        gameState.completedMatchsticks++;
                        if (gameState.completedMatchsticks < gameState.totalMatchsticks) {
                            nextMatchstick();
                        } else {
                            completeLevel();
                        }
                    } else if (gameState.mode === 'moving') {
                        gameState.completedMatchsticks++;
                        if (gameState.completedMatchsticks < gameState.totalMatchsticks) {
                            nextMovingMatchstick();
                        } else {
                            completeLevel();
                        }
                    } else {
                        completeLevel();
                    }
                }, 1500);
            } else {
                // 好感度：单次得分 <60 分（变形失败）→ -2 好感度
                gameState.favorability = Math.max(0, gameState.favorability - 2);
                saveAffection(gameState.favorability);
                updateDisplays();

                gameState.streak = 0;

                if (gameState.mode === 'sequential') {
                    document.getElementById('btn-clear').classList.remove('hidden');
                    showMessage(`${professorComment} 重画这根火柴吧！`, 'error');
                } else if (gameState.mode === 'moving') {
                    document.getElementById('btn-retry').classList.remove('hidden');
                    showMessage(`${professorComment} 重试本关吧！`, 'error');
                } else {
                    document.getElementById('btn-retry').classList.remove('hidden');
                    showMessage(`${professorComment} 重试本关吧！`, 'error');
                }
            }
        }


        // 下一根顺序火柴
        function nextMatchstick() {
            gameState.currentPath = [];
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            const angles = [0, 45, -45, 90, -90];
            const angle = angles[gameState.completedMatchsticks % angles.length];
            const distance = 60;

            const offsetX = Math.cos(angle * Math.PI / 180) * distance;
            const offsetY = Math.sin(angle * Math.PI / 180) * distance;

            gameState.matchsticks = [createMatchstick(centerX - 40 + offsetX, centerY - 5 + offsetY)];

            updateProgressIndicator();
            drawCanvas();
            showMessage('好的！画下一根火柴！');
        }

        // 下一根移动火柴
        function nextMovingMatchstick() {
            gameState.currentPath = [];
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            const positions = [centerY - 5, centerY - 50, centerY + 40, centerY - 80, centerY + 70];
            const yPos = positions[gameState.completedMatchsticks % positions.length];

            gameState.matchsticks = [createMatchstick(-80, yPos)];
            gameState.matchsticks[0].startX = -80;
            gameState.matchsticks[0].endX = canvas.width;

            updateProgressIndicator();
            drawCanvas();

            setTimeout(() => {
                if (gameState.isPlaying) {
                    startMovingMatchstick();
                    showMessage('好的！画下一根火柴！');
                }
            }, 500);
        }

        // 完成关卡
        function completeLevel() {
            stopChallenge();
            gameState.levelCompleted = true;

            if (gameState.level >= 3 && !gameState.modeCompleted[gameState.mode]) {
                gameState.modeCompleted[gameState.mode] = true;
                const reward = modeConfig[gameState.mode].reward;
                gameState.sessionCoins += reward;
                if (window.CoinManager) {
                    CoinManager.addCoins(reward);
                }

                // 好感度：模式全部通关奖励
                let affectionReward = 0;
                if (gameState.mode === 'basic') {
                    affectionReward = 4; // 基础模式单关全部成功→ +4 好感度
                } else if (gameState.mode === 'sequential') {
                    affectionReward = 8; // 多根火柴模式全部成功→ +8 好感度
                } else if (gameState.mode === 'moving') {
                    affectionReward = 12; // 移动火柴模式全部成功→ +12 好感度
                }
                gameState.favorability += affectionReward;
                saveAffection(gameState.favorability);

                showMessage(`太棒了！${modeConfig[gameState.mode].name}模式全部通关！获得${reward}金币！好感度+${affectionReward}！`, 'success');
            } else if (gameState.level < 3) {
                showMessage('太棒了！这一关通过了！', 'success');
                document.getElementById('btn-nextLevel').classList.remove('hidden');
            } else {
                showMessage('太棒了！这一关通过了！', 'success');
            }

            updateDisplays();
        }

        // 下一关
        function nextLevel() {
            initCanvas();
            gameState.level++;
            gameState.completedMatchsticks = 0;
            gameState.levelCompleted = false;
            resetGameUI();
            updateDisplays();
            drawCanvas();
            showMessage(`第 ${gameState.level} 关，准备好了吗？`);
            setTimeout(() => {
                startChallenge();
            }, 1000);
        }

        // 重试关卡
        function retryLevel() {
            initCanvas();
            gameState.completedMatchsticks = 0;
            gameState.levelCompleted = false;
            resetGameUI();
            drawCanvas();
            showMessage('再试一次！');
            setTimeout(() => {
                startChallenge();
            }, 1000);
        }

        // 清除画布
        function clearCanvas() {
            if (gameState.mode === 'basic') {
                // 基础模式：只清除当前路径，保留已完成的路径
                gameState.currentPath = [];
                gameState.currentTargetIndex = null;
            } else {
                // 其他模式：清除所有
                gameState.currentPath = [];
            }
            drawCanvas();
            document.getElementById('btn-clear').classList.add('hidden');
        }

        // 绘制整个画布
        function drawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawMatchsticks();

            // 绘制基础模式中已完成的火柴路径（显示为金色）
            if (gameState.mode === 'basic' && gameState.completedPaths.length > 0) {
                gameState.completedPaths.forEach(completed => {
                    if (completed.path.length > 1) {
                        ctx.save();
                        ctx.strokeStyle = '#FFD700'; // 金色表示已完成
                        ctx.lineWidth = 4;
                        ctx.shadowColor = '#FFD700';
                        ctx.shadowBlur = 10;

                        ctx.beginPath();
                        ctx.moveTo(completed.path[0].x, completed.path[0].y);

                        for (let i = 1; i < completed.path.length; i++) {
                            ctx.lineTo(completed.path[i].x, completed.path[i].y);
                        }

                        ctx.stroke();
                        ctx.restore();
                    }
                });
            }

            // 绘制当前正在画的路径
            if (gameState.currentPath.length > 1) {
                drawPath(gameState.currentPath);
            }
        }

        // 绘制火柴
        function drawMatchsticks() {
            gameState.matchsticks.forEach(matchstick => {
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(matchstick.x, matchstick.y, matchstick.width, matchstick.height);

                ctx.fillStyle = '#FF4500';
                ctx.beginPath();
                ctx.arc(matchstick.x + matchstick.width, matchstick.y + matchstick.height / 2, 8, 0, Math.PI * 2);
                ctx.fill();

                ctx.shadowBlur = 15;
                ctx.shadowColor = '#FF6600';
                ctx.fillStyle = '#FF8C00';
                ctx.beginPath();
                ctx.arc(matchstick.x + matchstick.width, matchstick.y + matchstick.height / 2, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            });
        }

        // 绘制路径
        function drawPath(points) {
            ctx.strokeStyle = '#C0C0C0';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.shadowBlur = 5;
            ctx.shadowColor = '#FFFFFF';

            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);

            for (let i = 1; i < points.length; i++) {
                ctx.lineTo(points[i].x, points[i].y);
            }

            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        // 计算特定火柴的评分（基础模式）
        function calculateScoreForSingleMatchstick(index) {
            let score = 50;
            let deductions = [];

            if (gameState.currentPath.length < 15) {
                return 30;
            }

            const matchstick = gameState.matchsticks[index];
            const coverage = calculatePathCoverageForMatchstick(matchstick);
            const lengthScore = calculateLengthScoreForMatchstick(matchstick);
            const positionScore = calculatePositionScoreForMatchstick(matchstick);
            const smoothness = calculatePathSmoothness();

            // 严格的失败条件
            if (lengthScore === -99 || positionScore === -99) {
                return 0;
            }

            score += lengthScore + positionScore + smoothness * 10;
            score += coverage * 30;

            score = Math.max(0, Math.min(100, Math.floor(score)));

            if (deductions.length > 0) {
                document.getElementById('scoreDetail').textContent = deductions.join(' | ');
                document.getElementById('scoreDetail').classList.remove('hidden');
            } else {
                document.getElementById('scoreDetail').classList.add('hidden');
            }

            return score;
        }

        // 计算评分（适用于单根火柴模式）
        function calculateScore() {
            let score = 50;
            let deductions = [];

            if (gameState.currentPath.length < 15) {
                return 30;
            }

            // 基础覆盖度
            let totalCoverage = 0;
            let matchCount = 0;
            let failedMatches = 0;

            gameState.matchsticks.forEach(matchstick => {
                const coverage = calculatePathCoverageForMatchstick(matchstick);
                const lengthScore = calculateLengthScoreForMatchstick(matchstick);
                const positionScore = calculatePositionScoreForMatchstick(matchstick);
                const smoothness = calculatePathSmoothness();

                // 严格的失败条件
                if (lengthScore === -99 || positionScore === -99) {
                    failedMatches++;
                } else {
                    totalCoverage += coverage;
                    score += lengthScore + positionScore + smoothness * 10;
                    matchCount++;
                }
            });

            if (failedMatches > 0) {
                return 0; // 任何一根火柴失败，整个关卡失败
            }

            if (matchCount > 0) {
                const avgCoverage = totalCoverage / matchCount;
                score += avgCoverage * 30;
            }

            score = Math.max(0, Math.min(100, Math.floor(score)));

            if (deductions.length > 0) {
                document.getElementById('scoreDetail').textContent = deductions.join(' | ');
                document.getElementById('scoreDetail').classList.remove('hidden');
            } else {
                document.getElementById('scoreDetail').classList.add('hidden');
            }

            return score;
        }

        // 计算特定火柴的路径覆盖率
        function calculatePathCoverageForMatchstick(matchstick) {
            const matchCenterX = matchstick.x + matchstick.width / 2;
            const matchCenterY = matchstick.y + matchstick.height / 2;

            let nearMatchstick = 0;
            gameState.currentPath.forEach(p => {
                const dist = Math.sqrt(
                    Math.pow(p.x - matchCenterX, 2) +
                    Math.pow(p.y - matchCenterY, 2)
                );
                if (dist < 60) nearMatchstick++;
            });

            return Math.min(1, nearMatchstick / gameState.currentPath.length * 2);
        }

        // 计算特定火柴的位置匹配度
        function calculatePositionMatchForMatchstick(matchstick) {
            const matchCenterX = matchstick.x + matchstick.width / 2;
            const matchCenterY = matchstick.y + matchstick.height / 2;

            let sumX = 0, sumY = 0;
            gameState.currentPath.forEach(p => {
                sumX += p.x;
                sumY += p.y;
            });

            const centerX = sumX / gameState.currentPath.length;
            const centerY = sumY / gameState.currentPath.length;

            const distance = Math.sqrt(
                Math.pow(centerX - matchCenterX, 2) +
                Math.pow(centerY - matchCenterY, 2)
            );

            const maxDistance = 80;
            return Math.max(0, 1 - (distance / maxDistance));
        }

        // 计算长度评分（新规则）
        function calculateLengthScoreForMatchstick(matchstick) {
            let totalLength = 0;
            for (let i = 1; i < gameState.currentPath.length; i++) {
                const dx = gameState.currentPath[i].x - gameState.currentPath[i-1].x;
                const dy = gameState.currentPath[i].y - gameState.currentPath[i-1].y;
                totalLength += Math.sqrt(dx * dx + dy * dy);
            }

            const matchstickLength = matchstick.width;
            const idealLength = matchstickLength;
            const lengthRatio = totalLength / idealLength;

            // 严格规则：超过10%算失败
            if (lengthRatio < 0.9 || lengthRatio > 1.1) {
                return -99; // 失败
            }
            return 0; // 长度符合要求
        }

        // 计算位置评分（新规则）
        function calculatePositionScoreForMatchstick(matchstick) {
            // 火柴棒范围：左右各延伸10%，上下各10px
            const matchstickLeft = matchstick.x - matchstick.width * 0.1;
            const matchstickRight = matchstick.x + matchstick.width * 1.1;
            const matchstickTop = matchstick.y - 10;
            const matchstickBottom = matchstick.y + matchstick.height + 10;

            let outOfBoundsCount = 0;

            gameState.currentPath.forEach(p => {
                if (p.x < matchstickLeft || p.x > matchstickRight ||
                    p.y < matchstickTop || p.y > matchstickBottom) {
                    outOfBoundsCount++;
                }
            });

            // 严格规则：有一点超出就算失败
            if (outOfBoundsCount > 0) {
                return -99; // 失败
            }
            return 0; // 位置符合要求
        }

        // 计算路径抖动（新规则）
        function calculateJitterScore() {
            let totalJitter = 0;

            for (let i = 2; i < gameState.currentPath.length; i++) {
                const dx1 = gameState.currentPath[i-1].x - gameState.currentPath[i-2].x;
                const dy1 = gameState.currentPath[i-1].y - gameState.currentPath[i-2].y;
                const dx2 = gameState.currentPath[i].x - gameState.currentPath[i-1].x;
                const dy2 = gameState.currentPath[i].y - gameState.currentPath[i-1].y;

                const angle1 = Math.atan2(dy1, dx1) * 180 / Math.PI;
                const angle2 = Math.atan2(dy2, dx2) * 180 / Math.PI;
                const angleDiff = Math.abs(angle1 - angle2);

                totalJitter += angleDiff;
            }

            const avgJitter = totalJitter / Math.max(1, gameState.currentPath.length - 2);

            if (avgJitter > 20) {
                return -20; // 严重抖动
            } else if (avgJitter > 10) {
                return -10; // 抖动较大
            } else if (avgJitter > 5) {
                return -5; // 轻微抖动
            }
            return 0; // 路径较直
        }

        // 计算路径平滑度
        function calculatePathSmoothness() {
            if (gameState.currentPath.length < 3) return 0.5;

            let smoothnessScore = 0;
            for (let i = 2; i < gameState.currentPath.length; i++) {
                const dx1 = gameState.currentPath[i-1].x - gameState.currentPath[i-2].x;
                const dy1 = gameState.currentPath[i-1].y - gameState.currentPath[i-2].y;
                const dx2 = gameState.currentPath[i].x - gameState.currentPath[i-1].x;
                const dy2 = gameState.currentPath[i].y - gameState.currentPath[i-1].y;

                const dot = dx1 * dx2 + dy1 * dy2;
                const mag1 = Math.sqrt(dx1 * dx1 + dy1 * dy1);
                const mag2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);

                if (mag1 > 0 && mag2 > 0) {
                    const cosAngle = dot / (mag1 * mag2);
                    smoothnessScore += (cosAngle + 1) / 2;
                }
            }

            return smoothnessScore / (gameState.currentPath.length - 2);
        }

        // 获取麦格教授的评价
        function getProfessorComment(score) {
            if (score >= 80) return '不错，很漂亮';
            if (score >= 60) return '还不错';
            return '太糟糕了';
        }

        // 更新评分显示
        function updateScoreDisplay(score) {
            const stars = getStars(score);
            const comment = getComment(score);

            document.getElementById('starsDisplay').textContent = stars;
            document.getElementById('commentText').textContent = comment;

            if (score >= 60) {
                gameState.sessionCoins += 3;
                if (window.CoinManager) {
                    CoinManager.addCoins(3);
                }
            }

            updateDisplays();
        }

        // 获取星级
        function getStars(score) {
            if (score >= 90) return '⭐⭐⭐⭐⭐';
            if (score >= 80) return '⭐⭐⭐⭐';
            if (score >= 60) return '⭐⭐⭐';
            if (score >= 40) return '⭐⭐';
            return '⭐';
        }

        // 火柴变银针动画（可选参数：targetIndex - 要动画的火柴索引）
        function playTransfigurationAnimation(targetIndex = null) {
            let progress = 0;
            const duration = 1500;
            const startTime = Date.now();

            // 确定要动画的火柴
            let targetMatchsticks = [];

            if (gameState.mode === 'basic' && targetIndex !== null) {
                // 基础模式：只对指定的火柴进行动画
                targetMatchsticks.push(gameState.matchsticks[targetIndex]);
            } else {
                // 其他模式或未指定索引：对所有火柴动画
                targetMatchsticks = [...gameState.matchsticks];
            }

            function animate() {
                const elapsed = Date.now() - startTime;
                progress = Math.min(elapsed / duration, 1);

                drawCanvas();

                // 绘制变形过程
                ctx.save();

                // 为目标火柴绘制魔法粒子
                targetMatchsticks.forEach(matchstick => {
                    drawMagicParticles(matchstick, progress);
                });

                // 火柴到银针的变形
                if (progress < 0.5) {
                    // 火柴溶解阶段
                    const dissolveProgress = progress * 2;

                    if (gameState.mode === 'basic' && targetIndex !== null) {
                        // 基础模式：先画所有火柴，然后半透明覆盖目标火柴
                        drawMatchsticks();
                        ctx.globalAlpha = 1 - dissolveProgress;
                        // 只溶解目标火柴（用背景色覆盖）
                        const targetMatchstick = targetMatchsticks[0];
                        ctx.fillStyle = '#1a1a1a'; // 匹配背景色
                        ctx.fillRect(targetMatchstick.x - 5, targetMatchstick.y - 5,
                                      targetMatchstick.width + 10, targetMatchstick.height + 10);
                    } else {
                        // 其他模式：所有火柴一起溶解
                        ctx.globalAlpha = 1 - dissolveProgress;
                        drawMatchsticks();
                    }
                    ctx.globalAlpha = 1;
                } else {
                    // 银针出现阶段
                    const appearProgress = (progress - 0.5) * 2;
                    ctx.globalAlpha = appearProgress;
                    targetMatchsticks.forEach(matchstick => {
                        drawSilverNeedle(matchstick, appearProgress);
                    });
                    ctx.globalAlpha = 1;
                }

                ctx.restore();

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    // 动画完成后，重置为火柴
                    setTimeout(() => {
                        drawCanvas();
                    }, 500);
                }
            }

            animate();
        }

        // 绘制魔法粒子
        function drawMagicParticles(matchstick, progress) {
            const centerX = matchstick.x + matchstick.width / 2;
            const centerY = matchstick.y + matchstick.height / 2;
            const particleCount = 20;

            for (let i = 0; i < particleCount; i++) {
                const angle = (i / particleCount) * Math.PI * 2;
                const radius = 30 + progress * 50;
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;

                ctx.beginPath();
                ctx.arc(x, y, 2 + progress * 2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(192, 192, 255, ${1 - progress})`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#C0C0FF';
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // 绘制银针
        function drawSilverNeedle(matchstick, progress) {
            const centerX = matchstick.x + matchstick.width / 2;
            const centerY = matchstick.y + matchstick.height / 2;
            const needleLength = matchstick.width * 1.1; // 10% longer than matchstick
            const needleWidth = matchstick.height * 0.5;

            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.scale(progress, progress);

            // 银针
            ctx.strokeStyle = '#C0C0C0';
            ctx.lineWidth = needleWidth;
            ctx.lineCap = 'round';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#FFFFFF';

            ctx.beginPath();
            ctx.moveTo(-needleLength / 2, 0);
            ctx.lineTo(needleLength / 2, 0);
            ctx.stroke();

            // 针尖
            ctx.beginPath();
            ctx.moveTo(needleLength / 2, 0);
            ctx.lineTo(needleLength / 2 + 8, -3);
            ctx.lineTo(needleLength / 2 + 8, 3);
            ctx.closePath();
            ctx.fillStyle = '#C0C0C0';
            ctx.fill();

            ctx.restore();
        }

        // 获取评语
        function getComment(score) {
            if (score >= 90) return '完美！变形术大师级水平';
            if (score >= 80) return '非常好！接近完美';
            if (score >= 60) return '合格！继续努力';
            if (score >= 40) return '需要改进，再试一次';
            return '变形失败，重新开始';
        }

        // 更新进度指示器
        function updateProgressIndicator() {
            const indicator = document.getElementById('progressIndicator');

            if (gameState.mode === 'sequential' || gameState.mode === 'moving' ||
                (gameState.mode === 'basic' && gameState.matchsticks.length > 1)) {
                indicator.classList.remove('hidden');
                document.getElementById('matchstickCountItem').classList.remove('hidden');

                if (gameState.mode === 'basic') {
                    // 基础模式：显示已完成数量和当前目标
                    document.getElementById('matchstickCountDisplay').textContent =
                        `${gameState.completedPaths.length}/${gameState.totalMatchsticks}`;

                    for (let i = 1; i <= 3; i++) {
                        const dot = document.getElementById(`dot-${i}`);
                        const completed = i <= gameState.completedPaths.length;
                        const current = i === (gameState.currentTargetIndex !== null ?
                            (gameState.currentTargetIndex + 1) : (gameState.completedPaths.length + 1));

                        if (completed) {
                            dot.className = 'progress-dot completed';
                        } else if (current) {
                            dot.className = 'progress-dot current';
                        } else {
                            dot.className = 'progress-dot';
                        }

                        if (i <= gameState.totalMatchsticks) {
                            dot.style.display = 'block';
                        } else {
                            dot.style.display = 'none';
                        }
                    }
                } else {
                    // 顺序模式和移动模式
                    const currentCount = gameState.completedMatchsticks + 1;
                    document.getElementById('matchstickCountDisplay').textContent =
                        `${currentCount}/${gameState.totalMatchsticks}`;

                    for (let i = 1; i <= 3; i++) {
                        const dot = document.getElementById(`dot-${i}`);
                        const completed = (i <= gameState.completedMatchsticks);
                        const current = (i === gameState.completedMatchsticks + 1);

                        if (completed) {
                            dot.className = 'progress-dot completed';
                        } else if (current) {
                            dot.className = 'progress-dot current';
                        } else {
                            dot.className = 'progress-dot';
                        }

                        if (i <= gameState.totalMatchsticks) {
                            dot.style.display = 'block';
                        } else {
                            dot.style.display = 'none';
                        }
                    }
                }
            } else if (gameState.isPlaying) {
                indicator.classList.remove('hidden');
                document.getElementById('matchstickCountItem').classList.add('hidden');

                for (let i = 1; i <= 3; i++) {
                    const dot = document.getElementById(`dot-${i}`);
                    if (i < gameState.level) {
                        dot.className = 'progress-dot completed';
                    } else if (i === gameState.level) {
                        dot.className = 'progress-dot current';
                    } else {
                        dot.className = 'progress-dot';
                    }
                }
            } else {
                indicator.classList.add('hidden');
                document.getElementById('matchstickCountItem').classList.add('hidden');
            }
        }

        // 更新游戏UI
        function updateGameUI() {
            document.getElementById('btn-clear').classList.add('hidden');
            document.getElementById('btn-retry').classList.add('hidden');
            document.getElementById('btn-nextLevel').classList.add('hidden');
            updateProgressIndicator();
        }

        // 重置游戏UI
        function resetGameUI() {
            document.getElementById('btn-clear').classList.add('hidden');
            document.getElementById('btn-retry').classList.add('hidden');
            document.getElementById('btn-nextLevel').classList.add('hidden');
            document.getElementById('timerDisplayGame').classList.add('hidden');
            document.getElementById('progressIndicator').classList.add('hidden');
            document.getElementById('matchstickCountItem').classList.add('hidden');
            document.getElementById('scoreDetail').classList.add('hidden');

            document.getElementById('starsDisplay').textContent = '⭐⭐⭐⭐⭐';
            document.getElementById('commentText').textContent = '准备开始你的变形术';

            gameState.currentPath = [];
        }

        // 显示消息
        function showMessage(text, type = 'info') {
            const dialogueEl = document.getElementById('teacherDialogue');
            dialogueEl.textContent = text;
            dialogueEl.style.color = type === 'success' ? '#2ecc71' :
                                     type === 'error' ? '#e74c3c' : '#d4af37';
        }

        // 更新显示
        function updateDisplays() {
            document.getElementById('favorabilityDisplay').textContent = gameState.favorability;
            document.getElementById('coinsDisplay').textContent = gameState.sessionCoins;
            document.getElementById('levelDisplay').textContent = gameState.level;
            document.getElementById('modeDisplay').textContent = modeConfig[gameState.mode].name;
        }

        // 加载好感度
        function loadAffection() {
            const mentorAffectionKey = 'hogwarts_mentor_affection';
            try {
                const savedMentorData = localStorage.getItem(mentorAffectionKey);
                if (savedMentorData) {
                    const mentorData = JSON.parse(savedMentorData);
                    return mentorData['mcgonagall'] || 0;
                }
            } catch (e) {
                console.error('Error reading mentor affection data:', e);
            }
            return 0;
        }

        // 保存好感度
        function saveAffection(affection) {
            const mentorAffectionKey = 'hogwarts_mentor_affection';
            let data = {};
            try {
                const savedData = localStorage.getItem(mentorAffectionKey);
                if (savedData) {
                    data = JSON.parse(savedData);
                }
            } catch (e) {
                console.error('Error parsing mentor affection data:', e);
            }
            data['mcgonagall'] = Math.max(0, affection); // 保证好感度不为负数
            localStorage.setItem(mentorAffectionKey, JSON.stringify(data));
        }

        // 加载游戏状态
        function loadGameState() {
            gameState.favorability = loadAffection();
        }

        // 返回大厅
        function goBack() {
            window.location.href = 'classes.html';
        }
    </script>
