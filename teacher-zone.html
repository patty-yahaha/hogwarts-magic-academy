<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔法导师专区 - 霍格沃茨魔法学院</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="academy.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        .teacher-zone-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 80vh;
        }

        .zone-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .zone-title {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 2.5rem;
            color: #d4af37;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            margin-bottom: 15px;
        }

        .zone-subtitle {
            font-family: 'Cinzel', serif;
            font-size: 1.3rem;
            color: #8b7355;
            font-style: italic;
        }

        /* 老师网格 */
        .teachers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        /* 老师卡片 */
        .teacher-card {
            background: linear-gradient(145deg, rgba(30, 20, 10, 0.9), rgba(20, 10, 5, 0.95));
            border: 3px solid #d4af37;
            border-radius: 20px;
            padding: 30px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5),
                        inset 0 1px 0 rgba(212, 175, 55, 0.2);
        }

        .teacher-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: #f0d060;
            box-shadow: 0 20px 50px rgba(212, 175, 55, 0.4);
        }

        .teacher-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.08) 0%, transparent 70%);
            animation: teacherGlow 8s linear infinite;
            pointer-events: none;
        }

        @keyframes teacherGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .teacher-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .teacher-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4a3f35, #2d261f);
            border: 4px solid #d4af37;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            flex-shrink: 0;
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.3);
        }

        .teacher-info {
            flex: 1;
        }

        .teacher-name {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 1.5rem;
            color: #d4af37;
            margin-bottom: 5px;
        }

        .teacher-badge {
            display: inline-block;
            background: linear-gradient(135deg, #d4af37, #c9a830);
            color: #1a0f00;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            margin-left: 10px;
        }

        /* 好感度条 */
        .affection-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .affection-bar-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .affection-bar {
            flex: 1;
            height: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .affection-bar-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
            background: linear-gradient(90deg, #ff6b6b, #d4af37);
        }

        .affection-value {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            min-width: 60px;
            text-align: right;
        }

        .affection-heart {
            color: #ff6b6b;
            animation: heartBeat 1.5s ease-in-out infinite;
            margin-right: 5px;
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* 好感度提示框 */
        .affection-message {
            margin-top: 15px;
            padding: 12px 15px;
            border-radius: 10px;
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            text-align: center;
        }

        .affection-message.low {
            background: rgba(255, 152, 0, 0.15);
            border: 2px solid rgba(255, 152, 0, 0.4);
            color: #ffb74d;
        }

        .affection-message.medium {
            background: rgba(76, 175, 80, 0.15);
            border: 2px solid rgba(76, 175, 80, 0.4);
            color: #81c784;
        }

        .affection-message.high {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(212, 175, 55, 0.15));
            border: 2px solid #ffd700;
            color: #ffd700;
            animation: highAffectionGlow 2s ease-in-out infinite;
        }

        @keyframes highAffectionGlow {
            0%, 100% { box-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
            50% { box-shadow: 0 0 25px rgba(255, 215, 0, 0.5); }
        }

        /* 奖感度增加动画 */
        .affection-increase {
            position: absolute;
            font-size: 1.5rem;
            color: #4caf50;
            font-weight: bold;
            animation: floatUp 1.5s ease-out forwards;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px) scale(1.5);
            }
        }
    </style>
</head>
<body>
    <div class="stars-bg"></div>
    <div class="magic-particles"></div>

    <div class="container">
        <header class="academy-header">
            <button class="back-btn" onclick="goBack()">
                ← <span class="back-text-zh">返回</span><span class="back-text-en">Back</span>
            </button>
            <h1 class="academy-title">
                <span class="title-text-zh">魔法导师专区</span>
                <span class="title-text-en">Magical Mentors</span>
            </h1>
        </header>

        <div class="teacher-zone-container">
            <div class="zone-header">
                <h2 class="zone-title">
                    <span class="title-text-zh">✨ 导师殿堂 ✨</span>
                    <span class="title-text-en">✨ Hall of Mentors ✨</span>
                </h2>
                <p class="zone-subtitle">
                    <span class="subtitle-text-zh">与各位导师建立联系，提升好感度</span>
                    <span class="subtitle-text-en">Connect with mentors and raise your affection</span>
                </p>
            </div>

            <div class="teachers-grid" id="teachersGrid">
                <div class="empty-state">
                    <div class="empty-state-icon">👨‍🏫</div>
                    <p class="empty-zh">正在加载导师数据...</p>
                    <p class="empty-en">Loading mentor data...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="draggable-coin.js"></script>
    <script>
        let currentLang = localStorage.getItem('siteLanguage') || 'zh';

        // 老师数据配置
        const MENTORS_DATA_KEY = 'hogwarts_teachers_data';
        const MENTOR_AFFECTION_KEY = 'hogwarts_mentor_affection';
        const MENTOR_LETTERS_KEY = 'hogwarts_mentor_letters';

        // 老师列表
        const TEACHERS = [
            {
                id: 'mcgonagall',
                nameZh: '麦格教授',
                nameEn: 'Professor McGonagall',
                avatar: '👨‍🏫',
                badge: '语言课',
                description: '严厉但公正的语言课导师',
                course: 'learning-zone'  // 网页学习区
            },
            {
                id: 'hooch',
                nameZh: '霍琦夫人',
                nameEn: 'Madam Hooch',
                avatar: '🧙‍♀️',
                badge: '飞行课',
                description: '经验丰富的飞行课导师',
                course: 'flying-class'  // 飞行课
            },
            {
                id: 'snape',
                nameZh: '斯内普教授',
                nameEn: 'Professor Snape',
                avatar: '🧛',
                badge: '魔药学',
                description: '神秘的魔药学教授',
                course: 'potions-class'  // 魔药课
            },
            {
                id: 'flitwick',
                nameZh: '弗立维教授',
                nameEn: 'Professor Flitwick',
                avatar: '🧙‍♂️',
                badge: '咒语课',
                description: '矮小而博学的咒语课教授',
                course: 'charms-class'  // 咒语课
            }
        ];

        // 获取老师好感度数据
        function getMentorAffectionData() {
            const data = localStorage.getItem(MENTOR_AFFECTION_KEY);
            if (!data) {
                const initialData = {};
                localStorage.setItem(MENTOR_AFFECTION_KEY, JSON.stringify(initialData));
                return initialData;
            }
            return JSON.parse(data);
        }

        // 保存老师好感度数据
        function saveMentorAffectionData(data) {
            localStorage.setItem(MENTOR_AFFECTION_KEY, JSON.stringify(data));
        }

        // 获取信件数据
        function getMentorLettersData() {
            const data = localStorage.getItem(MENTOR_LETTERS_KEY);
            if (!data) {
                const initialData = [];
                localStorage.setItem(MENTOR_LETTERS_KEY, JSON.stringify(initialData));
                return initialData;
            }
            return JSON.parse(data);
        }

        // 保存信件数据
        function saveMentorLettersData(data) {
            localStorage.setItem(MENTOR_LETTERS_KEY, JSON.stringify(data));
        }

        // 随机小零食列表
        const RANDOM_SNACKS = [
            { name: '巧克力蛙', icon: '🐸' },
            { name: '比比多味豆', icon: '🫘' },
            { name: '南瓜馅饼', icon: '🥧' },
            { name: '糖浆馅饼', icon: '🥧' },
            { name: '薄荷蟾蜍', icon: '🐸' },
            { name: '酸棒糖', icon: '🍭' },
            { name: '锅形蛋糕', icon: '🍰' },
            { name: '奶油冰淇淋', icon: '🍦' },
            { name: '太妃糖', icon: '🍬' },
            { name: '椒糖蝙蝠', icon: '🦇' }
        ];

        // 获取随机小零食
        function getRandomSnack() {
            return RANDOM_SNACKS[Math.floor(Math.random() * RANDOM_SNACKS.length)];
        }

        // 老师个性化邮件内容
        const MENTOR_MESSAGES = {
            'mcgonagall': {
                zh: `亲爱的学生，我必须说，你在语言学习方面的进步令人印象深刻。你展现出的专注和毅力正是格兰芬多所珍视的品质。虽然我一向以严厉著称，但你确实配得上这份称赞。继续努力，你会成为霍格沃茨的骄傲！这是给你的小奖励。`,
                en: `Dear student, I must say, your progress in language learning is impressive. The focus and perseverance you've shown are exactly the qualities Gryffindor values. While I am known for my strictness, you truly deserve this praise. Keep working hard, and you will become Hogwarts' pride! Here's a small reward for you.`
            },
            'hooch': {
                zh: `嘿，小巫师！你在飞行课上表现得越来越出色了。记住，掌握飞天扫帚需要的是耐心和自信，而你已经证明你拥有这两者。你的操控技巧进步显著，连我都感到惊讶！继续在天空中翱翔吧！这有个小零食给你补充能量。`,
                en: `Hey, young wizard! You're getting better and better in Flying Class. Remember, mastering a broomstick requires patience and confidence, and you've proven you have both. Your control skills have improved significantly, even I'm surprised! Keep soaring in the sky! Here's a snack to boost your energy.`
            },
            'snape': {
                zh: `哼...虽然我从不轻易表扬学生，但我不得不承认，你的魔药制作水平确实有进步。你在配方理解上的准确性和对细节的关注...勉强可以接受。别得意忘形，继续练习。如果你能保持这样的水准，或许有一天你真的会成为优秀的魔药师。拿去吧。`,
                en: `Hmm... while I rarely praise students, I have to admit your potion-making skills have indeed improved. Your accuracy in understanding recipes and attention to detail... are barely acceptable. Don't get cocky, keep practicing. If you can maintain this level, perhaps one day you'll truly become an excellent potions master. Take it.`
            },
            'flitwick': {
                zh: `噢，真是太令人惊喜了！亲爱的学生，你在咒语课上的表现简直令我感动。你的咒语发音精准，手势也愈发熟练。对于一个学习咒语的人来说，这样的进步是非凡的！我为你感到骄傲！这是给你的小奖励，继续加油！`,
                en: `Oh, this is truly surprising! Dear student, your performance in Charms Class has simply moved me. Your spell pronunciation is precise, and your wand movements are becoming more skilled. For someone learning charms, such progress is extraordinary! I'm so proud of you! Here's a small reward, keep it up!`
            }
        };

        // 添加老师信件
        function addMentorLetter(mentorId) {
            const letters = getMentorLettersData();
            const existingLetter = letters.find(l => l.mentorId === mentorId && !l.claimed);

            if (existingLetter) return false;

            // 获取老师信息
            const teacher = TEACHERS.find(t => t.id === mentorId);
            if (!teacher) return false;

            // 获取个性化邮件内容和随机零食
            const messages = MENTOR_MESSAGES[mentorId];
            const snack = getRandomSnack();

            const letter = {
                id: Date.now(),
                mentorId: mentorId,
                mentorName: currentLang === 'zh' ? teacher.nameZh : teacher.nameEn,
                messageZh: messages.zh,
                messageEn: messages.en,
                reward: { type: 'snack', name: snack.name, icon: snack.icon },
                claimed: false,
                createdAt: Date.now()
            };

            letters.push(letter);
            saveMentorLettersData(letters);
            console.log(`[导师专区] 已为 ${teacher.nameZh} 添加奖励邮件`);
            return true;
        }

        // 渲染老师列表
        function renderTeachers() {
            const affectionData = getMentorAffectionData();

            // 按好感度从高到底排序
            const sortedTeachers = [...TEACHERS].sort((a, b) => {
                const affectionA = affectionData[a.id] || 0;
                const affectionB = affectionData[b.id] || 0;
                return affectionB - affectionA;
            });

            const grid = document.getElementById('teachersGrid');
            grid.innerHTML = sortedTeachers.map(teacher => {
                const affection = affectionData[teacher.id] || 0;
                const percentage = Math.min(affection, 100);

                return `
                    <div class="teacher-card" data-teacher-id="${teacher.id}">
                        <div class="teacher-header">
                            <div class="teacher-avatar">${teacher.avatar}</div>
                            <div class="teacher-info">
                                <div class="teacher-name">
                                    <span class="name-zh">${teacher.nameZh}</span>
                                    <span class="name-en" style="display: ${currentLang === 'zh' ? 'none' : 'inline'}; font-size: 0.9rem; font-style: italic;">${teacher.nameEn}</span>
                                    <span class="teacher-badge">${teacher.badge}</span>
                                </div>
                            </div>
                        </div>
                        <div class="affection-section">
                            <div class="affection-bar-container">
                                <div class="affection-bar">
                                    <div class="affection-bar-fill" style="width: ${percentage}%;"></div>
                                </div>
                                <span class="affection-value">
                                    <span class="affection-heart">❤️</span>${affection}
                                </span>
                            </div>
                            <div class="affection-message" id="message-${teacher.id}"></div>
                        </div>
                    </div>
                `;
            }).join('');

            // 更新每个老师的提示信息
            sortedTeachers.forEach(teacher => {
                const affection = affectionData[teacher.id] || 0;
                const messageEl = document.getElementById(`message-${teacher.id}`);
                if (messageEl) {
                    updateAffectionMessage(messageEl, affection, teacher.nameZh, teacher.nameEn);
                }
            });
        }

        // 更新好感度消息
        function updateAffectionMessage(element, affection, nameZh, nameEn) {
            element.className = 'affection-message';
            element.style.display = 'block';

            let messageZh, messageEn;
            if (affection < 10) {
                element.classList.add('low');
                messageZh = `和${nameZh}老师还需要更多互动哦`;
                messageEn = `Need more interaction with ${nameEn}`;
            } else if (affection >= 20 && affection < 50) {
                element.classList.add('medium');
                messageZh = `${nameZh}老师对你印象不错`;
                messageEn = `${nameEn} has a good impression of you`;
            } else if (affection >= 50) {
                element.classList.add('high');
                messageZh = `${nameZh}老师非常欣赏你！`;
                messageEn = `${nameEn} truly appreciates you!`;
            } else {
                element.style.display = 'none';
            }

            if (currentLang === 'zh') {
                element.textContent = messageZh;
            } else {
                element.textContent = messageEn;
            }
        }

        // 检查老师信件触发
        function checkMentorLetters() {
            const affectionData = getMentorAffectionData();
            const letters = getMentorLettersData();

            let newLettersAdded = false;

            Object.entries(affectionData).forEach(([mentorId, affection]) => {
                if (affection >= 30) {
                    const existingLetter = letters.find(l => l.mentorId === mentorId);
                    if (!existingLetter) {
                        const teacher = TEACHERS.find(t => t.id === mentorId);
                        if (teacher) {
                            addMentorLetter(mentorId);
                            newLettersAdded = true;
                        }
                    }
                }
            });

            if (newLettersAdded) {
                // 更新邮件徽章
                updateMailBadge();
            }
        }

        // 更新邮件徽章
        function updateMailBadge() {
            const letters = getMentorLettersData();
            const unclaimedLetters = letters.filter(l => !l.claimed);
            const badge = document.getElementById('mailBadge');

            if (badge) {
                const count = unclaimedLetters.length;
                badge.textContent = count;
                badge.style.display = count > 0 ? 'flex' : 'none';
            }
        }

        // 领取信件奖励
        function claimLetterReward(letterId) {
            const letters = getMentorLettersData();
            const letterIndex = letters.findIndex(l => l.id === letterId);

            if (letterIndex === -1) return;
            const letter = letters[letterIndex];
            if (letter.claimed) return;

            // 添加到背包
            const inventory = JSON.parse(localStorage.getItem('hogwartsInventory') || '[]');
            inventory.push({
                id: Date.now(),
                ...letter.reward,
                source: 'mentor_letter'
            });
            localStorage.setItem('hogwartsInventory', JSON.stringify(inventory));

            // 标记为已领取
            letters[letterIndex].claimed = true;
            saveMentorLettersData(letters);

            // 更新邮件徽章
            updateMailBadge();
        }

        // 语言更新
        function updateLanguage() {
            renderTeachers();
        }

        // 返回
        function goBack() {
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.8s ease-in-out';
            setTimeout(() => {
                window.location.href = 'academy.html';
            }, 800);
        }

        // 初始化
        function init() {
            // 清理旧的里程碑成就数据
            localStorage.removeItem('hogwarts_mentor_achievements');

            renderTeachers();
            checkMentorLetters();
            updateLanguage();

            // 每分钟检查一次
            setInterval(() => {
                checkMentorLetters();
            }, 60000);

            // 监听语言切换
            document.addEventListener('languageChanged', () => {
                currentLang = localStorage.getItem('siteLanguage') || 'zh';
                updateLanguage();
            });

            // 监听 localStorage 变化，实时更新好感度显示
            window.addEventListener('storage', (e) => {
                if (e.key === MENTOR_AFFECTION_KEY) {
                    renderTeachers();
                    console.log('[导师专区] 检测到好感度数据变化，重新渲染');
                }
            });

            // 监听页面可见性变化（当用户从其他标签页返回时重新渲染）
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) {
                    renderTeachers();
                    console.log('[导师专区] 页面可见性变化，重新渲染老师列表');
                }
            });

            // 监听页面焦点变化
            window.addEventListener('focus', () => {
                renderTeachers();
                console.log('[导师专区] 页面获得焦点，重新渲染老师列表');
            });
        }

        init();
    </script>
</body>
</html>
