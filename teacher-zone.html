<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔法导师专区 - 霍格沃茨魔法学院</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="academy.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        .teacher-zone-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 80vh;
        }

        .zone-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .zone-title {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 2.5rem;
            color: #d4af37;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            margin-bottom: 15px;
        }

        .zone-subtitle {
            font-family: 'Cinzel', serif;
            font-size: 1.3rem;
            color: #8b7355;
            font-style: italic;
        }

        /* 老师网格 */
        .teachers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        /* 老师卡片 */
        .teacher-card {
            background: linear-gradient(145deg, rgba(30, 20, 10, 0.9), rgba(20, 10, 5, 0.95));
            border: 3px solid #d4af37;
            border-radius: 20px;
            padding: 30px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5),
                        inset 0 1px 0 rgba(212, 175, 55, 0.2);
        }

        .teacher-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: #f0d060;
            box-shadow: 0 20px 50px rgba(212, 175, 55, 0.4);
        }

        .teacher-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.08) 0%, transparent 70%);
            animation: teacherGlow 8s linear infinite;
            pointer-events: none;
        }

        @keyframes teacherGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .teacher-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .teacher-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4a3f35, #2d261f);
            border: 4px solid #d4af37;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            flex-shrink: 0;
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.3);
        }

        .teacher-info {
            flex: 1;
        }

        .teacher-name {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 1.5rem;
            color: #d4af37;
            margin-bottom: 5px;
        }

        .teacher-badge {
            display: inline-block;
            background: linear-gradient(135deg, #d4af37, #c9a830);
            color: #1a0f00;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            margin-left: 10px;
        }

        /* 好感度条 */
        .affection-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .affection-bar-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .affection-bar {
            flex: 1;
            height: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .affection-bar-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
            background: linear-gradient(90deg, #ff6b6b, #d4af37);
        }

        .affection-value {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            min-width: 60px;
            text-align: right;
        }

        .affection-heart {
            color: #ff6b6b;
            animation: heartBeat 1.5s ease-in-out infinite;
            margin-right: 5px;
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* 好感度提示框 */
        .affection-message {
            margin-top: 15px;
            padding: 12px 15px;
            border-radius: 10px;
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            text-align: center;
        }

        .affection-message.low {
            background: rgba(255, 152, 0, 0.15);
            border: 2px solid rgba(255, 152, 0, 0.4);
            color: #ffb74d;
        }

        .affection-message.medium {
            background: rgba(76, 175, 80, 0.15);
            border: 2px solid rgba(76, 175, 80, 0.4);
            color: #81c784;
        }

        .affection-message.high {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(212, 175, 55, 0.15));
            border: 2px solid #ffd700;
            color: #ffd700;
            animation: highAffectionGlow 2s ease-in-out infinite;
        }

        @keyframes highAffectionGlow {
            0%, 100% { box-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
            50% { box-shadow: 0 0 25px rgba(255, 215, 0, 0.5); }
        }

        /* 奖感度增加动画 */
        .affection-increase {
            position: absolute;
            font-size: 1.5rem;
            color: #4caf50;
            font-weight: bold;
            animation: floatUp 1.5s ease-out forwards;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px) scale(1.5);
            }
        }

        /* 里程碑成就 */
        .achievements-section {
            margin-top: 30px;
            padding: 25px;
            background: linear-gradient(145deg, rgba(20, 15, 30, 0.9), rgba(10, 10, 20, 0.95));
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 15px;
        }

        .achievements-title {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 1.5rem;
            color: #d4af37;
            text-align: center;
            margin-bottom: 20px;
        }

        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .achievement-item {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .achievement-item.unlocked {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), rgba(10, 20, 40, 0.95));
            border-color: #d4af37;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2);
        }

        .achievement-item.locked {
            opacity: 0.4;
            filter: grayscale(1);
        }

        .achievement-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .achievement-name {
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            color: #d4af37;
            margin-bottom: 5px;
        }

        .achievement-reward {
            font-size: 0.8rem;
            color: #8b7355;
        }

        .claim-btn {
            background: linear-gradient(135deg, #d4af37, #c9a830);
            color: #1a0f00;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .claim-btn:hover {
            background: linear-gradient(135deg, #f0d060, #d4af37);
            transform: scale(1.05);
        }

        .claim-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8b7355;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="stars-bg"></div>
    <div class="magic-particles"></div>

    <div class="container">
        <header class="academy-header">
            <button class="back-btn" onclick="goBack()">
                ← <span class="back-text-zh">返回</span><span class="back-text-en">Back</span>
            </button>
            <h1 class="academy-title">
                <span class="title-text-zh">魔法导师专区</span>
                <span class="title-text-en">Magical Mentors</span>
            </h1>
        </header>

        <div class="teacher-zone-container">
            <div class="zone-header">
                <h2 class="zone-title">
                    <span class="title-text-zh">✨ 导师殿堂 ✨</span>
                    <span class="title-text-en">✨ Hall of Mentors ✨</span>
                </h2>
                <p class="zone-subtitle">
                    <span class="subtitle-text-zh">与各位导师建立联系，提升好感度</span>
                    <span class="subtitle-text-en">Connect with mentors and raise your affection</span>
                </p>
            </div>

            <div class="teachers-grid" id="teachersGrid">
                <div class="empty-state">
                    <div class="empty-state-icon">👨‍🏫</div>
                    <p class="empty-zh">正在加载导师数据...</p>
                    <p class="empty-en">Loading mentor data...</p>
                </div>
            </div>

            <div class="achievements-section" id="achievementsSection" style="display: none;">
                <h3 class="achievements-title">
                    <span class="title-zh">🏆 好感度里程碑</span>
                    <span class="title-en">🏆 Affection Milestones</span>
                </h3>
                <div class="achievements-grid" id="achievementsGrid"></div>
            </div>
        </div>
    </div>

    <script src="draggable-coin.js"></script>
    <script>
        let currentLang = localStorage.getItem('siteLanguage') || 'zh';

        // 老师数据配置
        const MENTORS_DATA_KEY = 'hogwarts_teachers_data';
        const MENTOR_AFFECTION_KEY = 'hogwarts_mentor_affection';
        const MENTOR_ACHIEVEMENTS_KEY = 'hogwarts_mentor_achievements';
        const MENTOR_LETTERS_KEY = 'hogwarts_mentor_letters';

        // 老师列表
        const TEACHERS = [
            {
                id: 'mcgonagall',
                nameZh: '麦格教授',
                nameEn: 'Professor McGonagall',
                avatar: '👨‍🏫',
                badge: '变形术',
                description: '严厉但公正的变形术教授'
            },
            {
                id: 'flitwick',
                nameZh: '弗立维教授',
                nameEn: 'Professor Flitwick',
                avatar: '🧙',
                badge: '魔咒课',
                description: '慈祥的魔咒课教授'
            },
            {
                id: 'sprout',
                nameZh: '斯普劳特教授',
                nameEn: 'Professor Sprout',
                avatar: '👩‍🌱',
                badge: '草药学',
                description: '温和的草药学教授'
            },
            {
                id: 'snape',
                nameZh: '斯内普教授',
                nameEn: 'Professor Snape',
                avatar: '🧛',
                badge: '魔药学',
                description: '神秘的魔药学教授'
            },
            {
                id: 'hagrid',
                nameZh: '海格',
                nameEn: 'Rubeus Hagrid',
                avatar: '🧔',
                badge: '保护神奇生物',
                description: '温和的神奇生物保护课教授'
            },
            {
                id: 'dumbledore',
                nameZh: '邓布利多教授',
                nameEn: 'Professor Dumbledore',
                avatar: '🧙‍✨',
                badge: '校长',
                description: '伟大的霍格沃茨校长'
            },
            {
                id: 'language_teacher',
                nameZh: '语言导师',
                nameEn: 'Language Mentor',
                avatar: '📚',
                badge: '世界语言',
                description: '教授世界语言课程'
            }
        ];

        // 好感度里程碑
        const MILESTONES = [
            { affection: 10, rewardType: 'avatar', icon: '🎭', name: '初识恩师', description: '好感度达到10' },
            { affection: 30, rewardType: 'frame', icon: '⭐', name: '良师益友', description: '好感度达到30' },
            { affection: 50, rewardType: 'avatar', icon: '👑', name: '桃李满门', description: '好感度达到50' },
            { affection: 70, rewardType: 'frame', icon: '👑', name: '德高望重', description: '好感度达到70' },
            { affection: 100, rewardType: 'special', icon: '🏆', name: '名师高徒', description: '好感度达到100' }
        ];

        // 随机头像列表
        const AVATAR_REWARDS = ['🧙', '🧙‍♂️', '🧝', '👩', '🧙‍♀️', '🧛', '🧛‍♂️', '🧜', '🧜‍♀️'];

        // 随机头像框
        const FRAME_REWARDS = ['✨金色光环✨', '🌟闪耀之星🌟', '🔮神秘符文🔮', '💫魔法结界💫'];

        // 获取老师好感度数据
        function getMentorAffectionData() {
            const data = localStorage.getItem(MENTOR_AFFECTION_KEY);
            if (!data) {
                const initialData = {};
                localStorage.setItem(MENTOR_AFFECTION_KEY, JSON.stringify(initialData));
                return initialData;
            }
            return JSON.parse(data);
        }

        // 保存老师好感度数据
        function saveMentorAffectionData(data) {
            localStorage.setItem(MENTOR_AFFECTION_KEY, JSON.stringify(data));
        }

        // 获取成就数据
        function getAchievementsData() {
            const data = localStorage.getItem(MENTOR_ACHIEVEMENTS_KEY);
            if (!data) {
                const initialData = {
                    unlocked: [],
                    claimed: []
                };
                localStorage.setItem(MENTOR_ACHIEVEMENTS_KEY, JSON.stringify(initialData));
                return initialData;
            }
            return JSON.parse(data);
        }

        // 保存成就数据
        function saveAchievementsData(data) {
            localStorage.setItem(MENTOR_ACHIEVEMENTS_KEY, JSON.stringify(data));
        }

        // 获取信件数据
        function getMentorLettersData() {
            const data = localStorage.getItem(MENTOR_LETTERS_KEY);
            if (!data) {
                const initialData = [];
                localStorage.setItem(MENTOR_LETTERS_KEY, JSON.stringify(initialData));
                return initialData;
            }
            return JSON.parse(data);
        }

        // 保存信件数据
        function saveMentorLettersData(data) {
            localStorage.setItem(MENTOR_LETTERS_KEY, JSON.stringify(data));
        }

        // 添加老师信件
        function addMentorLetter(mentorId, mentorName) {
            const letters = getMentorLettersData();
            const existingLetter = letters.find(l => l.mentorId === mentorId && !l.claimed);

            if (existingLetter) return false;

            const letter = {
                id: Date.now(),
                mentorId: mentorId,
                mentorName: mentorName,
                messageZh: `亲爱的学生，我非常欣赏你的努力和进步！继续保持这样的学习态度，你将成为霍格沃茨的优秀学生。这是给你的小礼物，请查收！`,
                messageEn: `Dear student, I truly appreciate your hard work and progress! Keep up such a learning attitude, and you will become an excellent student at Hogwarts. Here's a small gift for you, please check!`,
                reward: { type: 'snack', name: '巧克力蛙', icon: '🐸' },
                claimed: false,
                createdAt: Date.now()
            };

            letters.push(letter);
            saveMentorLettersData(letters);
            return true;
        }

        // 检查并解锁成就
        function checkAndUnlockAchievements() {
            const achievements = getAchievementsData();
            const affectionData = getMentorAffectionData();

            const newlyUnlocked = [];

            MILESTONES.forEach(milestone => {
                const isUnlocked = achievements.unlocked.includes(milestone.affection);
                if (!isUnlocked) {
                    // 检查是否有任何老师达到这个好感度
                    const hasTeacherAtLevel = Object.values(affectionData).some(a => a >= milestone.affection);
                    if (hasTeacherAtLevel) {
                        achievements.unlocked.push(milestone.affection);
                        newlyUnlocked.push(milestone);
                    }
                }
            });

            if (newlyUnlocked.length > 0) {
                saveAchievementsData(achievements);
                return newlyUnlocked;
            }

            return [];
        }

        // 渲染老师列表
        function renderTeachers() {
            const affectionData = getMentorAffectionData();

            // 按好感度从高到底排序
            const sortedTeachers = [...TEACHERS].sort((a, b) => {
                const affectionA = affectionData[a.id] || 0;
                const affectionB = affectionData[b.id] || 0;
                return affectionB - affectionA;
            });

            const grid = document.getElementById('teachersGrid');
            grid.innerHTML = sortedTeachers.map(teacher => {
                const affection = affectionData[teacher.id] || 0;
                const percentage = Math.min(affection, 100);

                return `
                    <div class="teacher-card" data-teacher-id="${teacher.id}">
                        <div class="teacher-header">
                            <div class="teacher-avatar">${teacher.avatar}</div>
                            <div class="teacher-info">
                                <div class="teacher-name">
                                    <span class="name-zh">${teacher.nameZh}</span>
                                    <span class="name-en" style="display: ${currentLang === 'zh' ? 'none' : 'inline'}; font-size: 0.9rem; font-style: italic;">${teacher.nameEn}</span>
                                    <span class="teacher-badge">${teacher.badge}</span>
                                </div>
                            </div>
                        </div>
                        <div class="affection-section">
                            <div class="affection-bar-container">
                                <div class="affection-bar">
                                    <div class="affection-bar-fill" style="width: ${percentage}%;"></div>
                                </div>
                                <span class="affection-value">
                                    <span class="affection-heart">❤️</span>${affection}
                                </span>
                            </div>
                            <div class="affection-message" id="message-${teacher.id}"></div>
                        </div>
                    </div>
                `;
            }).join('');

            // 更新每个老师的提示信息
            sortedTeachers.forEach(teacher => {
                const affection = affectionData[teacher.id] || 0;
                const messageEl = document.getElementById(`message-${teacher.id}`);
                if (messageEl) {
                    updateAffectionMessage(messageEl, affection, teacher.nameZh, teacher.nameEn);
                }
            });
        }

        // 更新好感度消息
        function updateAffectionMessage(element, affection, nameZh, nameEn) {
            element.className = 'affection-message';
            element.style.display = 'block';

            let messageZh, messageEn;
            if (affection < 10) {
                element.classList.add('low');
                messageZh = `和${nameZh}老师还需要更多互动哦`;
                messageEn = `Need more interaction with ${nameEn}`;
            } else if (affection >= 20 && affection < 50) {
                element.classList.add('medium');
                messageZh = `${nameZh}老师对你印象不错`;
                messageEn = `${nameEn} has a good impression of you`;
            } else if (affection >= 50) {
                element.classList.add('high');
                messageZh = `${nameZh}老师非常欣赏你！`;
                messageEn = `${nameEn} truly appreciates you!`;
            } else {
                element.style.display = 'none';
            }

            if (currentLang === 'zh') {
                element.textContent = messageZh;
            } else {
                element.textContent = messageEn;
            }
        }

        // 渲染成就
        function renderAchievements() {
            const achievements = getAchievementsData();
            const grid = document.getElementById('achievementsGrid');

            grid.innerHTML = MILESTONES.map(milestone => {
                const isUnlocked = achievements.unlocked.includes(milestone.affection);
                const isClaimed = achievements.claimed.includes(milestone.affection);

                const rewardText = currentLang === 'zh' ?
                    `奖励: ${milestone.rewardType === 'avatar' ? '随机头像' : milestone.rewardType === 'frame' ? '随机头像框' : '特殊奖励'}` :
                    `Reward: ${milestone.rewardType === 'avatar' ? 'Random Avatar' : milestone.rewardType === 'frame' ? 'Random Frame' : 'Special Reward'}`;

                return `
                    <div class="achievement-item ${isUnlocked ? 'unlocked' : 'locked'}">
                        <div class="achievement-icon">${milestone.icon}</div>
                        <div class="achievement-name">
                            <span class="name-zh">${milestone.name}</span>
                            <span class="name-en" style="display: ${currentLang === 'zh' ? 'none' : 'inline'}; font-size: 0.8rem;">${milestone.description}</span>
                        </div>
                        <div class="achievement-reward">${rewardText}</div>
                        ${isUnlocked && !isClaimed ? `
                            <button class="claim-btn" onclick="claimAchievement(${milestone.affection})">
                                <span class="btn-zh">领取</span>
                                <span class="btn-en">Claim</span>
                            </button>
                        ` : isClaimed ? `
                            <div style="color: #4caf50; font-size: 0.8rem; margin-top: 10px;">
                                <span class="claimed-zh">✓ 已领取</span>
                                <span class="claimed-en" style="display: ${currentLang === 'zh' ? 'none' : 'inline'};">✓ Claimed</span>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');

            const section = document.getElementById('achievementsSection');
            section.style.display = achievements.unlocked.length > 0 ? 'block' : 'none';
        }

        // 领取成就奖励
        function claimAchievement(milestone) {
            const achievements = getAchievementsData();

            if (!achievements.unlocked.includes(milestone)) return;
            if (achievements.claimed.includes(milestone)) return;

            // 随机生成奖励
            let reward;
            if (milestone.rewardType === 'avatar') {
                reward = {
                    type: 'avatar',
                    icon: AVATAR_REWARDS[Math.floor(Math.random() * AVATAR_REWARDS.length)],
                    name: '头像'
                };
            } else if (milestone.rewardType === 'frame') {
                reward = {
                    type: 'frame',
                    icon: FRAME_REWARDS[Math.floor(Math.random() * FRAME_REWARDS.length)],
                    name: '头像框'
                };
            } else {
                reward = {
                    type: 'special',
                    icon: '👑',
                    name: '特殊奖励'
                };
            }

            // 添加到背包（通过localStorage存储）
            const inventory = JSON.parse(localStorage.getItem('hogwartsInventory') || '[]');
            inventory.push({
                id: Date.now(),
                ...reward,
                source: 'mentor_achievement'
            });
            localStorage.setItem('hogwartsInventory', JSON.stringify(inventory));

            // 标记为已领取
            achievements.claimed.push(milestone);
            saveAchievementsData(achievements);

            // 重新渲染
            renderAchievements();
        }

        // 检查老师信件触发
        function checkMentorLetters() {
            const affectionData = getMentorAffectionData();
            const letters = getMentorLettersData();

            let newLettersAdded = false;

            Object.entries(affectionData).forEach(([mentorId, affection]) => {
                if (affection >= 30) {
                    const existingLetter = letters.find(l => l.mentorId === mentorId);
                    if (!existingLetter) {
                        const teacher = TEACHERS.find(t => t.id === mentorId);
                        if (teacher) {
                            addMentorLetter(mentorId, currentLang === 'zh' ? teacher.nameZh : teacher.nameEn);
                            newLettersAdded = true;
                        }
                    }
                }
            });

            if (newLettersAdded) {
                // 更新邮件徽章
                updateMailBadge();
            }
        }

        // 更新邮件徽章
        function updateMailBadge() {
            const letters = getMentorLettersData();
            const unclaimedLetters = letters.filter(l => !l.claimed);
            const badge = document.getElementById('mailBadge');

            if (badge) {
                const count = unclaimedLetters.length;
                badge.textContent = count;
                badge.style.display = count > 0 ? 'flex' : 'none';
            }
        }

        // 领取信件奖励
        function claimLetterReward(letterId) {
            const letters = getMentorLettersData();
            const letterIndex = letters.findIndex(l => l.id === letterId);

            if (letterIndex === -1) return;
            const letter = letters[letterIndex];
            if (letter.claimed) return;

            // 添加到背包
            const inventory = JSON.parse(localStorage.getItem('hogwartsInventory') || '[]');
            inventory.push({
                id: Date.now(),
                ...letter.reward,
                source: 'mentor_letter'
            });
            localStorage.setItem('hogwartsInventory', JSON.stringify(inventory));

            // 标记为已领取
            letters[letterIndex].claimed = true;
            saveMentorLettersData(letters);

            // 更新邮件徽章
            updateMailBadge();
        }

        // 语言更新
        function updateLanguage() {
            renderTeachers();
            renderAchievements();
        }

        // 返回
        function goBack() {
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.8s ease-in-out';
            setTimeout(() => {
                window.location.href = 'academy.html';
            }, 800);
        }

        // 初始化
        function init() {
            renderTeachers();
            renderAchievements();
            checkMentorLetters();
            checkAndUnlockAchievements();
            updateLanguage();

            // 每分钟检查一次
            setInterval(() => {
                checkAndUnlockAchievements();
                checkMentorLetters();
            }, 60000);

            // 监听语言切换
            document.addEventListener('languageChanged', () => {
                currentLang = localStorage.getItem('siteLanguage') || 'zh';
                updateLanguage();
            });
        }

        init();
    </script>
</body>
</html>
