        // 初始化
        function init() {
            // 标记预言家日报已访问（用于徽章显示）
            localStorage.setItem('prophetLastReadDate', new Date().toDateString());

            updateCurrentDate();
            loadNews(newsDatabase);
        }

        // 更新当前日期显示
        function updateCurrentDate() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            const dateStr = now.toLocaleDateString(currentLang === 'zh' ? 'zh-CN' : 'en-US', options);
            document.getElementById('currentDate').textContent = dateStr;
        }

        // 获取分类名称
        function getCategoryName(category) {
            const categories = {
                zh: {
                    politics: '政治',
                    business: '商业',
                    classifieds: '分类广告',
                    sports: '体育',
                    school: '教育'
                },
                en: {
                    politics: 'Politics',
                    business: 'Business',
                    classifieds: 'Classifieds',
                    sports: 'Sports',
                    school: 'Education'
                }
            };
            return categories[currentLang][category] || category;
        }

        // 加载新闻缩略图
        function loadNews(news) {
            const container = document.getElementById('newsArticles');

            if (news.length === 0) {
                container.innerHTML = `
                    <div class="no-results">
                        <div class="no-results-icon">📰</div>
                        <p>没有找到相关新闻 / No news articles found</p>
                    </div>
                `;
                return;
            }

            // 按日期从新到旧排序
            const sortedNews = [...news].sort((a, b) => new Date(b.date) - new Date(a.date));

            container.innerHTML = sortedNews.map(article => {
                const content = article[currentLang];
                const dateObj = new Date(article.date);
                const dateStr = dateObj.toLocaleDateString(currentLang === 'zh' ? 'zh-CN' : 'en-US', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });

                return `
                    <div class="news-card" onclick="openNewsDetail(${article.id})" data-id="${article.id}" data-category="${article.category}">
                        <div class="news-header">
                            <span class="news-date-badge">${dateStr}</span>
                            <h2 class="news-title">${content.title}</h2>
                            <p class="news-summary">${content.summary}</p>
                        </div>
                        <div class="news-thumbnail">${article.icon}</div>
                        <div class="news-footer">
                            <span class="news-author">✍️ ${content.author}</span>
                            <span class="news-category">${getCategoryName(article.category)}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 打开新闻详情
        function openNewsDetail(articleId) {
            const article = newsDatabase.find(a => a.id === articleId);
            if (!article) return;

            const content = article[currentLang];
            const modal = document.getElementById('newsDetailModal');
            const detailContent = document.getElementById('newsDetailContent');

            const dateObj = new Date(article.date);
            const dateStr = dateObj.toLocaleDateString(currentLang === 'zh' ? 'zh-CN' : 'en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });

            detailContent.innerHTML = `
                <div class="detail-header">
                    <button class="close-detail-btn" onclick="closeNewsDetail()">✕</button>
                    <span class="detail-date-badge">${dateStr}</span>
                    <h1 class="detail-title">${content.title}</h1>
                    <p class="detail-summary">${content.summary}</p>
                </div>
                <div class="detail-body">
                    <div class="detail-image">${article.icon}</div>
                    <div class="detail-text">${content.content.split('\n').map(p => p ? `<p>${p}</p>` : '').join('')}</div>
                </div>
                <div class="detail-footer">
                    <span class="detail-author">✍️ ${content.author}</span>
                    <span class="detail-category">${getCategoryName(article.category)}</span>
                </div>
            `;

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // 关闭新闻详情
        function closeNewsDetail() {
            const modal = document.getElementById('newsDetailModal');
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        // 点击模态框外部关闭
        document.addEventListener('click', function(e) {
            const modal = document.getElementById('newsDetailModal');
            if (e.target === modal) {
                closeNewsDetail();
            }
        });

        // ESC键关闭
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeNewsDetail();
            }
        });

        // 搜索新闻
        function searchNews() {
            const keyword = document.getElementById('keywordSearch').value.toLowerCase();
            const dateInput = document.getElementById('dateSearch').value;

            let filteredNews = newsDatabase;

            // 按日期筛选
            if (dateInput) {
                const searchDate = new Date(dateInput);
                filteredNews = filteredNews.filter(article => {
                    const articleDate = new Date(article.date);
                    return articleDate.toDateString() === searchDate.toDateString();
                });
            }

            // 按关键词筛选
            if (keyword) {
                filteredNews = filteredNews.filter(article => {
                    const zhContent = article.zh.title + article.zh.summary + article.zh.content;
                    const enContent = article.en.title + article.en.summary + article.en.content;
                    return zhContent.toLowerCase().includes(keyword) ||
                           enContent.toLowerCase().includes(keyword);
                });
            }

            loadNews(filteredNews);
        }

        // 切换语言
        function switchLanguage(lang) {
            currentLang = lang;

            // 更新语言按钮状态
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.lang === lang) {
                    btn.classList.add('active');
                }
            });

            // 更新日期显示
            updateCurrentDate();

            // 重新加载新闻（保持当前的搜索条件）
            searchNews();
        }

        // 返回大厅
        function goBack() {
            window.location.href = 'academy.html';
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            init();

            // 回车搜索
            document.getElementById('keywordSearch').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    searchNews();
                }
            });

            document.getElementById('dateSearch').addEventListener('change', function() {
                searchNews();
            });
        });
    </script>
</body>
</html>
