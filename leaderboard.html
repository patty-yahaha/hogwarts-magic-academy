<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金加隆排行榜 - 霍格沃茨魔法学院</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="academy.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=MedievalSharp&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 排行榜样式 */
        .leaderboard-list {
            display: none;
        }

        .leaderboard-list.active {
            display: block;
        }

        .leaderboard-item {
            background: linear-gradient(145deg, rgba(20, 30, 50, 0.95), rgba(10, 20, 40, 0.98));
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .leaderboard-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            border-color: rgba(212, 175, 55, 0.6);
        }

        .leaderboard-item.rank-1 {
            border-color: #ffd700;
            background: linear-gradient(145deg, rgba(255, 215, 0, 0.15), rgba(10, 20, 40, 0.98));
        }

        .leaderboard-item.rank-2 {
            border-color: #c0c0c0;
            background: linear-gradient(145deg, rgba(192, 192, 192, 0.15), rgba(10, 20, 40, 0.98));
        }

        .leaderboard-item.rank-3 {
            border-color: #cd7f32;
            background: linear-gradient(145deg, rgba(205, 127, 50, 0.15), rgba(10, 20, 40, 0.98));
        }

        .leaderboard-item.current-user {
            border-color: #4caf50;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.4);
        }

        .rank-number {
            background: linear-gradient(135deg, #d4af37, #c9a227);
            color: #1a1a2e;
            font-family: 'Cinzel Decorative', cursive;
            font-size: 1.8rem;
            font-weight: bold;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
            flex-shrink: 0;
        }

        .player-avatar {
            font-size: 3rem;
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), rgba(10, 20, 40, 0.98));
            border: 3px solid #d4af37;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            flex-shrink: 0;
        }

        .player-info {
            flex: 1;
            min-width: 0;
        }

        .player-name {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 1.4rem;
            color: #d4af37;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        .player-stats {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 0.95rem;
            color: #e0e0e0;
        }

        .stat-icon {
            font-size: 1.2rem;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .leaderboard-item {
                padding: 15px;
                gap: 15px;
            }

            .rank-number {
                width: 50px;
                height: 50px;
                font-size: 1.4rem;
            }

            .player-avatar {
                width: 60px;
                height: 60px;
                font-size: 2.5rem;
            }

            .player-name {
                font-size: 1.1rem;
            }

            .player-stats {
                gap: 10px;
            }

            .stat-item {
                padding: 6px 12px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="stars-bg"></div>
    <div class="magic-particles"></div>

    <div class="container">
        <!-- 顶部导航栏 -->
        <header class="academy-header">
            <button class="back-btn" onclick="goBack()">
                ← <span class="back-text-zh">返回</span><span class="back-text-en">Back</span>
            </button>
            <h1 class="academy-title">
                <span class="title-text-zh">金加隆排行榜</span>
                <span class="title-text-en">Galleon Leaderboard</span>
            </h1>
        </header>

        <div class="leaderboard-container">
            <!-- 商店标题 -->
            <div class="shop-header">
                <h2 class="shop-title">🧹 金加隆排行榜 🧹</h2>
                <p class="shop-subtitle">
                    <span class="subtitle-zh">—— 展示全服巫师的财富排名 ——</span>
                    <span class="subtitle-en">— Show all wizards' wealth rankings —</span>
                </p>
            </div>

            <!-- 切换标签 -->
            <div class="leaderboard-tabs">
                <div class="leaderboard-tab active" data-tab="coins" onclick="switchLeaderboardTab('coins')">
                    <span class="lang-zh">💰 金加隆榜</span>
                    <span class="lang-en">💰 Galleons</span>
                </div>
                <div class="leaderboard-tab" data-tab="affection" onclick="switchLeaderboardTab('affection')">
                    <span class="lang-zh">⭐ 等级榜</span>
                    <span class="lang-en">⭐ Level</span>
                </div>
            </div>

            <!-- 金加隆排行榜 -->
            <div class="leaderboard-list active" id="coinsLeaderboard">
                <div class="loading-spinner">
                    <span class="lang-zh">正在加载排行榜...</span>
                    <span class="lang-en">Loading leaderboard...</span>
                </div>
            </div>

            <!-- 等级排行榜 -->
            <div class="leaderboard-list" id="affectionLeaderboard">
                <div class="loading-spinner">
                    <span class="lang-zh">正在加载排行榜...</span>
                    <span class="lang-en">Loading leaderboard...</span>
                </div>
            </div>
        </div>

        <!-- 魔法提示 -->
        <div class="magic-tip">
            <p class="tip-text-zh">✨ 财富与荣耀并存 ✨</p>
            <p class="tip-text-en">✨ Wealth and Glory ✨</p>
        </div>
    </div>

    <script>
        // 语言切换
        let currentLang = localStorage.getItem('siteLanguage') || 'zh';

        function updateLanguage() {
            document.body.classList.remove('lang-zh', 'lang-en');
            document.body.classList.add(currentLang === 'zh' ? 'lang-zh' : 'lang-en');

            document.querySelector('.back-btn').innerHTML = currentLang === 'zh' ?
                '← 返回' : '← Back';
        }

        // 返回
        function goBack() {
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.5s ease-in-out';
            setTimeout(() => {
                window.location.href = 'wizard-camp.html';
            }, 500);
        }

        // ========== 排行榜功能 ==========
        const SUPABASE_URL = 'https://xxalvnwmqhfcohcvebnp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh4YWx2bndtcWhmY29oY3ZlYm5wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxNzk3NDksImV4cCI6MjA4Nzc1NTc0OX0.VcFTOE9cUOqnsDL3QazvPje93LoKgA2tlXLt0NK2FKg';

        let currentLeaderboardTab = 'coins';

        window.switchLeaderboardTab = function(tab) {
            currentLeaderboardTab = tab;
            document.querySelectorAll('.leaderboard-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.leaderboard-tab[data-tab="${tab}"]`).classList.add('active');
            document.querySelectorAll('.leaderboard-list').forEach(l => l.classList.remove('active'));
            document.getElementById(`${tab}Leaderboard`).classList.add('active');
        };

        async function loadLeaderboardData(type) {
            const container = document.getElementById(`${type}Leaderboard`);
            const currentUserId = localStorage.getItem('userId');

            console.log(`加载${type === 'coins' ? '金币' : '等级'}排行榜...`);

            try {
                const isGuest = localStorage.getItem('isGuest') === 'true';

                if (isGuest || !currentUserId) {
                    console.log('用户未登录');
                    container.innerHTML = `
                        <div class="login-prompt">
                            <div class="lang-zh">请先登录查看排行榜</div>
                            <div class="lang-en">Please login to view leaderboard</div>
                            <button class="login-btn" onclick="goBack()">
                                <span class="lang-zh">返回登录</span>
                                <span class="lang-en">Back to Login</span>
                            </button>
                        </div>
                    `;
                    return;
                }

                const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

                console.log('开始查询数据库...');
                const { data: profiles, error } = await sb
                    .from('player_profiles')
                    .select('*');

                if (error) {
                    console.error('数据库查询错误:', error);
                    throw error;
                }

                console.log('查询到的用户数据:', profiles);
                console.log('用户数量:', profiles ? profiles.length : 0);

                if (!profiles || profiles.length === 0) {
                    container.innerHTML = `
                        <div class="empty-message">
                            <div class="lang-zh">暂无排行榜数据</div>
                            <div class="lang-en">No leaderboard data yet</div>
                        </div>
                    `;
                    return;
                }

                // 设置特定用户的固定金币数量
                const fixedCoins = {
                    '琥珀': 50,
                    'KK': 200,
                    'Cathy': 400
                };

                let sortedProfiles = [...profiles];
                // 对特定用户应用固定金币数量
                sortedProfiles = sortedProfiles.map(profile => {
                    const displayName = profile.nickname || profile.username || '';
                    if (fixedCoins[displayName] !== undefined) {
                        return { ...profile, cumulative_coins: fixedCoins[displayName] };
                    }
                    return profile;
                });

                if (type === 'coins') {
                    sortedProfiles.sort((a, b) => (b.cumulative_coins || 0) - (a.cumulative_coins || 0));
                } else if (type === 'affection') {
                    sortedProfiles.sort((a, b) => (b.level || 0) - (a.level || 0));
                }

                sortedProfiles = sortedProfiles.slice(0, 50);

                container.innerHTML = sortedProfiles.map((profile, index) => {
                    const rank = index + 1;
                    const isCurrentUser = profile.id === currentUserId;
                    const displayName = profile.nickname || profile.username || '匿名巫师';

                    return `
                        <div class="leaderboard-item rank-${rank <= 3 ? rank : ''} ${isCurrentUser ? 'current-user' : ''}">
                            <div class="rank-number">${rank}</div>
                            <div class="player-avatar">${profile.avatar || '🧙'}</div>
                            <div class="player-info">
                                <div class="player-name">${displayName}</div>
                                <div class="player-stats">
                                    ${type === 'coins' ? `
                                        <div class="stat-item">
                                            <span class="stat-icon">🪙</span>
                                            <span>${profile.cumulative_coins || 0}</span>
                                        </div>
                                    ` : `
                                        <div class="stat-item">
                                            <span class="stat-icon">⭐</span>
                                            <span>等级 ${profile.level || 1}</span>
                                        </div>
                                    `}
                                    <div class="stat-item">
                                        <span class="stat-icon">🏠</span>
                                        <span>${profile.house || 'Gryffindor'}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (error) {
                console.error('加载排行榜失败:', error);
                container.innerHTML = `
                    <div class="error-message">
                        <div class="lang-zh">加载失败，请稍后重试</div>
                        <div class="lang-en">Failed to load, please try again later</div>
                        <div style="margin-top: 10px; font-size: 0.9rem; opacity: 0.7;">${error.message || ''}</div>
                    </div>
                `;
            }
        }

        // 更新金币显示
        function updateCoinDisplay() {
            const coins = parseInt(localStorage.getItem('hogwartsCoins') || '0');
            document.getElementById('coinAmount').textContent = coins;
        }

        // 页面加载时初始化
        updateLanguage();
        // updateCoinDisplay();  // 已禁用金币显示
        loadLeaderboardData('coins');
        loadLeaderboardData('affection');

        // 创建魔法粒子
        function createMagicParticles() {
            const container = document.querySelector('.magic-particles');
            if (!container) return;
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(particle);
            }
        }

        createMagicParticles();
    </script>
    <script src="draggable-coin.js"></script>
</body>
</html>
