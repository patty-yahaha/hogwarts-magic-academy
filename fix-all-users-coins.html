<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>批量修复金币 - 霍格沃茨魔法学院</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="academy.css">
    <style>
        .fix-container {
            max-width: 800px;
            margin: 50px auto;
            padding: 30px;
            background: linear-gradient(145deg, rgba(20, 30, 50, 0.95), rgba(10, 20, 40, 0.98));
            border: 3px solid #d4af37;
            border-radius: 20px;
        }

        .fix-title {
            text-align: center;
            font-family: 'Cinzel Decorative', cursive;
            font-size: 2rem;
            color: #d4af37;
            margin-bottom: 30px;
        }

        .user-list {
            margin-top: 20px;
        }

        .user-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid #d4af37;
        }

        .user-item.needs-fix {
            border-left-color: #e74c3c;
        }

        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .user-name {
            color: #e0e0e0;
            font-weight: bold;
            flex: 1;
            min-width: 150px;
        }

        .coins-display {
            display: flex;
            gap: 20px;
            font-size: 0.9rem;
        }

        .coins-label {
            color: #c9a830;
        }

        .coins-value {
            color: #d4af37;
            font-weight: bold;
        }

        .coins-value.broken {
            color: #e74c3c;
        }

        .btn {
            background: linear-gradient(135deg, #d4af37, #c9a227);
            border: 2px solid #ffd700;
            color: #1a1a2e;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: linear-gradient(135deg, #ffd700, #d4af37);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }

        .btn:disabled {
            background: #666;
            border-color: #555;
            cursor: not-allowed;
            opacity: 0.5;
            transform: none;
        }

        .status {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            display: none;
        }

        .status.success {
            background: rgba(39, 174, 96, 0.2);
            color: #27ae60;
            display: block;
        }

        .status.error {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            display: block;
        }

        .info-text {
            text-align: center;
            margin-top: 20px;
            color: #e0e0e0;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .summary {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
        }

        .summary-title {
            color: #ffd700;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="stars-bg"></div>

    <div class="container">
        <div class="fix-container">
            <h1 class="fix-title">🔧 批量修复用户金币</h1>

            <div class="info-text">
                <p>💡 此工具会检查所有用户的金币数据，并自动修复累计金币。</p>
                <p>⚠️ 修复规则：如果 累计金币 < 当前金币，则设置为当前金币。</p>
                <p>🔗 修复后会同步到数据库。</p>
            </div>

            <button class="btn" onclick="fetchUsers()" id="fetchBtn">
                获取所有用户数据
            </button>

            <button class="btn" onclick="fixAllUsers()" id="fixBtn" style="display: none; margin-top: 10px;">
                修复所有用户金币
            </button>

            <div class="status" id="statusMessage"></div>

            <div class="summary" id="summary" style="display: none;">
                <div class="summary-title">📊 修复摘要</div>
                <div id="summaryContent"></div>
            </div>

            <div class="user-list" id="userList"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://xxalvnwmqhfcohcvebnp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh4YWx2bndtcWhmY29oY3ZlYm5wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxNzk3NDksImV4cCI6MjA4Nzc1NTc0OX0.VcFTOE9cUOqnsDL3QazvPje93LoKgA2tlXLt0NK2FKg';
        let allUsers = [];

        function initSupabase() {
            if (window.supabase) {
                return window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            }
        }

        // 显示状态消息
        function showStatus(message, isError = false) {
            const status = document.getElementById('statusMessage');
            status.textContent = message;
            status.className = 'status ' + (isError ? 'error' : 'success');
        }

        // 获取所有用户数据
        async function fetchUsers() {
            const btn = document.getElementById('fetchBtn');
            const status = document.getElementById('statusMessage');
            const userList = document.getElementById('userList');

            btn.disabled = true;
            showStatus('⏳ 正在获取用户数据...');

            try {
                const supabase = initSupabase();
                const { data: users, error } = await supabase
                    .from('player_profiles')
                    .select('id, nickname, avatar, coins, cumulative_coins')
                    .order('cumulative_coins', { ascending: false });

                if (error) {
                    throw error;
                }

                allUsers = users || [];
                displayUsers();

                const needsFix = allUsers.filter(u => (u.cumulative_coins || 0) < (u.coins || 0));
                document.getElementById('fixBtn').style.display = needsFix.length > 0 ? 'block' : 'none';

                if (needsFix.length > 0) {
                    showStatus(`找到 ${allUsers.length} 个用户，其中 ${needsFix.length} 个需要修复`);
                } else {
                    showStatus(`找到 ${allUsers.length} 个用户，所有数据正常`);
                }

            } catch (error) {
                console.error('获取用户失败:', error);
                showStatus('❌ 获取用户失败: ' + error.message, true);
                btn.disabled = false;
            }
        }

        // 显示用户列表
        function displayUsers() {
            const userList = document.getElementById('userList');
            userList.innerHTML = '';

            allUsers.forEach(user => {
                const current = user.coins || 0;
                const cumulative = user.cumulative_coins || 0;
                const needsFix = cumulative < current;

                const div = document.createElement('div');
                div.className = 'user-item' + (needsFix ? ' needs-fix' : '');
                div.innerHTML = `
                    <div class="user-info">
                        <div class="user-name">
                            ${user.avatar || '🧙'} ${user.nickname || '未知用户'}
                        </div>
                        <div class="coins-display">
                            <span class="coins-label">当前:</span>
                            <span class="coins-value ${needsFix ? 'broken' : ''}">${current}</span>
                            <span class="coins-label">累计:</span>
                            <span class="coins-value ${needsFix ? 'broken' : ''}">${cumulative}</span>
                            ${needsFix ? '<span style="color: #e74c3c; margin-left: 10px;">⚠️ 需要修复</span>' : '<span style="color: #27ae60; margin-left: 10px;">✅ 正常</span>'}
                        </div>
                    </div>
                `;
                userList.appendChild(div);
            });
        }

        // 修复所有用户
        async function fixAllUsers() {
            const btn = document.getElementById('fixBtn');
            const fetchBtn = document.getElementById('fetchBtn');
            const summary = document.getElementById('summary');
            const summaryContent = document.getElementById('summaryContent');

            btn.disabled = true;
            showStatus('⏳ 正在修复用户金币...');

            let fixedCount = 0;
            let failedUsers = [];

            for (const user of allUsers) {
                const current = user.coins || 0;
                const cumulative = user.cumulative_coins || 0;

                // 只修复需要修复的用户
                if (cumulative < current) {
                    try {
                        const supabase = initSupabase();
                        const { error } = await supabase
                            .from('player_profiles')
                            .update({
                                cumulative_coins: current,
                                updated_at: new Date().toISOString()
                            })
                            .eq('id', user.id);

                        if (error) {
                            console.error(`修复用户 ${user.nickname} 失败:`, error);
                            failedUsers.push({ nickname: user.nickname, error: error.message });
                        } else {
                            fixedCount++;
                            console.log(`已修复用户 ${user.nickname}: 累计金币 ${cumulative} → ${current}`);
                        }
                    } catch (error) {
                        console.error(`修复用户 ${user.nickname} 失败:`, error);
                        failedUsers.push({ nickname: user.nickname, error: error.message });
                    }
                }
            }

            // 更新摘要
            summary.style.display = 'block';
            summaryContent.innerHTML = `
                <div>总用户数: ${allUsers.length}</div>
                <div>已修复: <span style="color: #27ae60;">${fixedCount}</span></div>
                <div>失败: <span style="color: #e74c3c;">${failedUsers.length}</span></div>
                ${failedUsers.length > 0 ? '<div style="margin-top: 10px; color: #e74c3c;">失败用户: ' + failedUsers.map(f => `${f.nickname} (${f.error})`).join(', ') + '</div>' : ''}
            `;

            if (failedUsers.length === 0) {
                showStatus(`✅ 已完成！修复了 ${fixedCount} 个用户的金币`);
            } else {
                showStatus(`⚠️ 完成！修复了 ${fixedCount} 个用户，${failedUsers.length} 个失败`, true);
            }

            // 刷新显示
            await fetchUsers();
            fetchBtn.disabled = false;
        }
    </script>
</body>
</html>
