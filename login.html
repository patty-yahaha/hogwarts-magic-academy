<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霍格沃茨魔法学院 - 登录</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=MedievalSharp&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cinzel', serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #d4af37;
            position: relative;
            overflow-y: auto;
        }

        /* 登录容器居中包裹层 */
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 星空背景 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* 登录容器 */
        .login-container {
            position: relative;
            z-index: 1;
            background: linear-gradient(145deg, rgba(20, 30, 50, 0.95), rgba(10, 20, 40, 0.98));
            border: 3px solid rgba(212, 175, 55, 0.5);
            border-radius: 30px;
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(212, 175, 55, 0.2);
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            font-size: 4rem;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.5));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .logo-title {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 2rem;
            color: #d4af37;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .logo-subtitle {
            font-size: 0.9rem;
            color: #8b7355;
            margin-top: 5px;
            font-style: italic;
        }

        /* 表单切换 */
        .form-toggle {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 5px;
            margin-bottom: 30px;
        }

        .toggle-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #8b7355;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .toggle-btn.active {
            background: linear-gradient(135deg, #d4af37, #c9a227);
            color: #1a1a2e;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }

        /* 表单样式 */
        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            font-size: 0.9rem;
            color: #c9a227;
            margin-bottom: 10px;
        }

        .form-input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 12px;
            color: #d4af37;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .form-input::placeholder {
            color: #5a4a3a;
        }

        /* 提交按钮 */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #d4af37, #c9a227);
            border: none;
            border-radius: 15px;
            color: #1a1a2e;
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3);
            position: relative;
            overflow: hidden;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(212, 175, 55, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* 错误提示 */
        .error-message {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid rgba(231, 76, 60, 0.5);
            border-radius: 10px;
            padding: 12px 15px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #e74c3c;
            text-align: center;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* 成功提示 */
        .success-message {
            background: rgba(39, 174, 96, 0.2);
            border: 1px solid rgba(39, 174, 96, 0.5);
            border-radius: 10px;
            padding: 12px 15px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #27ae60;
            text-align: center;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        /* 加载动画 */
        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(26, 26, 46, 0.3);
            border-top-color: #d4af37;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .submit-btn.loading .btn-text {
            display: none;
        }

        .submit-btn.loading .loading-spinner {
            display: block;
        }

        /* 底部链接 */
        .footer-link {
            text-align: center;
            margin-top: 25px;
            font-size: 0.85rem;
            color: #8b7355;
        }

        .footer-link a {
            color: #d4af37;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-link a:hover {
            color: #ffd700;
        }

        /* 游客模式按钮 */
        .guest-mode-section {
            margin-top: 20px;
            padding: 15px;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1), rgba(255, 215, 0, 0.05));
            border: 1px solid #d4af37;
            border-radius: 8px;
            text-align: center;
        }

        .guest-mode-title {
            font-size: 0.9rem;
            color: #d4af37;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .guest-btn {
            width: 100%;
            padding: 12px 20px;
            background: linear-gradient(135deg, #d4af37, #c9a227);
            color: #1a1a2e;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 10px rgba(212, 175, 55, 0.3);
        }

        .guest-btn:hover {
            background: linear-gradient(135deg, #ffd700, #d4af37);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.5);
        }

        .network-notice {
            margin-top: 15px;
            padding: 10px;
            background: rgba(255, 152, 0, 0.1);
            border-left: 3px solid #ff9800;
            border-radius: 4px;
            font-size: 0.75rem;
            color: #ff9800;
            text-align: left;
        }

        .network-notice-zh {
            display: block;
            margin-bottom: 5px;
        }

        .network-notice-en {
            display: block;
            opacity: 0.8;
            font-size: 0.7rem;
        }

        /* 表单显示/隐藏 */
        .form-content {
            display: none;
        }

        .form-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        /* 密码强度指示器 */
        .password-strength {
            height: 4px;
            background: rgba(212, 175, 55, 0.2);
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0;
            transition: all 0.3s ease;
        }

        .password-strength-weak { width: 33%; background: #e74c3c; }
        .password-strength-medium { width: 66%; background: #f39c12; }
        .password-strength-strong { width: 100%; background: #27ae60; }

        .password-strength-text {
            font-size: 0.75rem;
            margin-top: 5px;
            color: #8b7355;
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .login-wrapper {
                align-items: flex-start;
                padding: 10px;
            }

            .login-container {
                padding: 30px 20px;
                margin: 10px 0;
                max-width: 100%;
            }

            .logo-title {
                font-size: 1.6rem;
            }

            .logo-subtitle {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="login-wrapper">
        <div class="login-container">
        <div class="logo">
            <div class="logo-icon">🏰</div>
            <h1 class="logo-title">霍格沃茨魔法学院</h1>
            <p class="logo-subtitle">Hogwarts School of Witchcraft and Wizardry</p>
        </div>

        <!-- 表单切换 -->
        <div class="form-toggle">
            <button class="toggle-btn active" onclick="showForm('login')" id="loginToggle">登录</button>
            <button class="toggle-btn" onclick="showForm('register')" id="registerToggle">注册</button>
        </div>

        <!-- 错误提示 -->
        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <!-- 登录表单 -->
        <div class="form-content active" id="loginForm">
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">邮箱 Email</label>
                    <input type="email" class="form-input" id="loginEmail" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">密码 Password</label>
                    <input type="password" class="form-input" id="loginPassword" placeholder="••••••••" required>
                </div>

                <button type="submit" class="submit-btn" id="loginBtn">
                    <span class="btn-text">进入魔法世界 Enter the Magic</span>
                    <div class="loading-spinner"></div>
                </button>
            </form>
        </div>

        <!-- 注册表单 -->
        <div class="form-content" id="registerForm">
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label class="form-label">邮箱 Email</label>
                    <input type="email" class="form-input" id="registerEmail" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">昵称 Nickname</label>
                    <input type="text" class="form-input" id="registerNickname" placeholder="魔法学徒" maxlength="20" required>
                </div>

                <div class="form-group">
                    <label class="form-label">密码 Password</label>
                    <input type="password" class="form-input" id="registerPassword" placeholder="至少6位 At least 6 characters"
                           minlength="6" required oninput="checkPasswordStrength()">
                    <div class="password-strength">
                        <div class="password-strength-bar" id="strengthBar"></div>
                    </div>
                    <div class="password-strength-text" id="strengthText"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">确认密码 Confirm Password</label>
                    <input type="password" class="form-input" id="registerPasswordConfirm" placeholder="••••••••" required>
                </div>

                <button type="submit" class="submit-btn" id="registerBtn">
                    <span class="btn-text">开始魔法之旅 Begin Your Journey</span>
                    <div class="loading-spinner"></div>
                </button>
            </form>
        </div>

        <!-- 游客模式 -->
        <div class="guest-mode-section">
            <div class="guest-mode-title">🎭 推荐使用游客模式 / Guest Mode Recommended</div>
            <button class="guest-btn" onclick="continueAsGuest(event)">
                <span class="btn-zh">👤 作为游客进入</span>
                <span class="btn-en" style="display: block; font-size: 0.85rem; margin-top: 3px;">Enter as Guest</span>
            </button>
            <div class="network-notice">
                <span class="network-notice-zh">⚠️ 注意：登录/注册功能可能因网络限制无法使用</span>
                <span class="network-notice-en">⚠️ Note: Login/Registration may not work due to network restrictions</span>
            </div>
        </div>

        <div class="footer-link">
            <a href="javascript:void(0)" onclick="showForm('login')">← 返回登录/注册 / Back to Login/Register</a>
        </div>
    </div>
    </div>

    <script>
    (function() {
        const SUPABASE_URL = 'https://xxalvnwmqhfcohcvebnp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh4YWx2bndtcWhmY29oY3ZlYm5wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxNzk3NDksImV4cCI6MjA4Nzc1NTc0OX0.VcFTOE9cUOqnsDL3QazvPje93LoKgA2tlXLt0NK2FKg';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentLang = localStorage.getItem('siteLanguage') || 'zh';

        window.showForm = function(form) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const loginToggle = document.getElementById('loginToggle');
            const registerToggle = document.getElementById('registerToggle');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');
            if (form === 'login') {
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
                loginToggle.classList.add('active');
                registerToggle.classList.remove('active');
            } else {
                loginForm.classList.remove('active');
                registerForm.classList.add('active');
                loginToggle.classList.remove('active');
                registerToggle.classList.add('active');
            }
        };

        window.checkPasswordStrength = function() {
            const password = document.getElementById('registerPassword').value;
            const strengthBar = document.getElementById('strengthBar');
            const strengthText = document.getElementById('strengthText');
            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            strengthBar.className = 'password-strength-bar';
            if (strength <= 2) {
                strengthBar.classList.add('password-strength-weak');
                strengthText.textContent = currentLang === 'zh' ? '密码强度：弱' : 'Strength: Weak';
            } else if (strength <= 3) {
                strengthBar.classList.add('password-strength-medium');
                strengthText.textContent = currentLang === 'zh' ? '密码强度：中' : 'Strength: Medium';
            } else {
                strengthBar.classList.add('password-strength-strong');
                strengthText.textContent = currentLang === 'zh' ? '密码强度：强' : 'Strength: Strong';
            }
        };

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 5000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.classList.add('show');
        }

        function setButtonLoading(btnId, loading) {
            const btn = document.getElementById(btnId);
            if (loading) {
                btn.classList.add('loading');
                btn.disabled = true;
            } else {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        window.handleLogin = async function(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            setButtonLoading('loginBtn', true);

            try {
                console.log('正在尝试登录...', new Date().toISOString());
                console.log('Supabase URL:', SUPABASE_URL);

                // 首先测试网络连接
                try {
                    const testResponse = await fetch(SUPABASE_URL + '/rest/v1/', {
                        method: 'GET',
                        headers: { 'apikey': SUPABASE_KEY }
                    });
                    console.log('网络连接测试结果:', testResponse.status);
                } catch (testErr) {
                    console.warn('网络连接测试失败:', testErr);
                }

                const { data, error } = await sb.auth.signInWithPassword({ email: email, password: password });

                if (error) {
                    console.error('Supabase 返回错误:', error);
                    if (error.message.includes('Invalid login credentials')) {
                        showError(currentLang === 'zh' ? '邮箱或密码错误' : 'Invalid email or password');
                    } else if (error.message.includes('Email not confirmed')) {
                        showError(currentLang === 'zh' ? '请先验证邮箱' : 'Please verify your email first');
                    } else {
                        showError(error.message);
                    }
                    setButtonLoading('loginBtn', false);
                    return;
                }

                localStorage.setItem('userId', data.user.id);
                localStorage.setItem('userEmail', data.user.email);
                showSuccess(currentLang === 'zh' ? '登录成功！正在跳转...' : 'Login successful! Redirecting...');
                setTimeout(() => { window.location.href = 'academy.html'; }, 1000);
            } catch (error) {
                console.error('Login error details:', error);
                console.error('Error name:', error.name);
                console.error('Error message:', error.message);
                console.error('Error stack:', error.stack);

                // 检测是否是网络/CORS错误
                if (error.message === 'Failed to fetch' || error.name === 'TypeError' || !navigator.onLine) {
                    const debugInfo = '\n\n调试信息:\n' +
                        '当前协议: ' + window.location.protocol + '\n' +
                        '当前主机: ' + window.location.hostname + '\n' +
                        '网络状态: ' + (navigator.onLine ? '在线' : '离线');

                    const corsMsg = currentLang === 'zh' ?
                        '⚠️ 网络连接错误\n\n可能原因：\n1. 请使用 Live Server 打开（不要直接双击 html）\n2. 检查网络连接\n3. Supabase 服务可能暂时不可用\n\n' + debugInfo + '\n\n建议：使用游客模式进入' :
                        '⚠️ Network Error\n\nPossible causes:\n1. Use Live Server (don\'t open html directly)\n2. Check network connection\n3. Supabase may be temporarily unavailable\n\n' + debugInfo + '\n\nTry using Guest Mode';
                    showError(corsMsg);
                } else {
                    showError(currentLang === 'zh' ? '登录失败：' + error.message + '\n\n请查看控制台获取更多信息' : 'Login failed: ' + error.message + '\n\nCheck console for more info');
                }
                setButtonLoading('loginBtn', false);
            }
        };

        window.handleRegister = async function(event) {
            event.preventDefault();
            const email = document.getElementById('registerEmail').value;
            const nickname = document.getElementById('registerNickname').value;
            const password = document.getElementById('registerPassword').value;
            const passwordConfirm = document.getElementById('registerPasswordConfirm').value;
            if (password !== passwordConfirm) {
                showError(currentLang === 'zh' ? '两次输入的密码不一致' : 'Passwords do not match');
                setButtonLoading('registerBtn', false);
                return;
            }
            if (password.length < 6) {
                showError(currentLang === 'zh' ? '密码至少需要6位' : 'Password must be at least 6 characters');
                setButtonLoading('registerBtn', false);
                return;
            }
            setButtonLoading('registerBtn', true);
            try {
                const { data: signUpData, error: signUpError } = await sb.auth.signUp({
                    email: email,
                    password: password,
                    options: { data: { nickname: nickname } }
                });
                if (signUpError) {
                    if (signUpError.message.includes('already registered')) {
                        showError(currentLang === 'zh' ? '该邮箱已被注册' : 'Email already registered');
                    } else {
                        showError(signUpError.message);
                    }
                    setButtonLoading('registerBtn', false);
                    return;
                }
                const { error: updateError } = await sb.from('player_profiles').update({ nickname: nickname }).eq('id', signUpData.user.id);
                if (updateError) {
                    console.error('Error updating profile:', updateError);
                }
                showSuccess(currentLang === 'zh' ? '注册成功！请查看邮箱验证邮件（如果没有收到，请直接登录）。' : 'Registration successful! Please check your email to verify (or try logging in directly).');
                setTimeout(async () => {
                    const { data: signInData, error: signInError } = await sb.auth.signInWithPassword({ email: email, password: password });
                    if (!signInError) {
                        localStorage.setItem('userId', signInData.user.id);
                        localStorage.setItem('userEmail', signInData.user.email);
                        window.location.href = 'academy.html';
                    } else {
                        window.showForm('login');
                        document.getElementById('loginEmail').value = email;
                        setButtonLoading('registerBtn', false);
                    }
                }, 2000);
            } catch (error) {
                console.error('Registration error:', error);

                // 检测是否是网络/CORS错误
                if (error.message === 'Failed to fetch' || error.name === 'TypeError') {
                    const corsMsg = currentLang === 'zh' ?
                        '⚠️ 网络连接错误\n\n这可能是因为：\n1. Supabase API 未配置此域名的 CORS 权限\n2. 网络连接问题\n\n建议：\n• 使用游客模式进入\n• 或联系开发者添加托管域名到 Supabase 白名单' :
                        '⚠️ Network Error\n\nThis may be because:\n1. CORS not configured for this domain\n2. Network connection issues\n\nSuggestions:\n• Use Guest Mode\n• Or contact developer to add domain to Supabase whitelist';
                    showError(corsMsg);
                } else {
                    showError(currentLang === 'zh' ? '注册失败：' + error.message : 'Registration failed: ' + error.message);
                }
                setButtonLoading('registerBtn', false);
            }
        };

        window.continueAsGuest = function(event) {
            event.preventDefault(); // 阻止默认链接行为
            localStorage.setItem('isGuest', 'true');
            localStorage.removeItem('userId');
            localStorage.removeItem('userEmail');
            // 设置完成后跳转
            window.location.href = 'academy.html';
        };

        async function checkAuth() {
            // 检查 URL 参数，如果有 force=true 则跳过自动检查
            const urlParams = new URLSearchParams(window.location.search);
            const forceLogin = urlParams.get('force') === 'true';

            if (forceLogin) {
                console.log('强制登录模式：跳过自动检查');
                return; // 直接返回，不执行自动检查
            }

            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                localStorage.setItem('userId', session.user.id);
                localStorage.setItem('userEmail', session.user.email);
                window.location.href = 'academy.html';
            }
        }

        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = (Math.random() * 3 + 1) + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 3 + 's';
                container.appendChild(star);
            }
        }

        createStars();
        checkAuth();
        sb.auth.onAuthStateChange((event, session) => {
            if (session) {
                localStorage.setItem('userId', session.user.id);
                localStorage.setItem('userEmail', session.user.email);
            }
        });
    })();
    </script>
</body>
</html>
