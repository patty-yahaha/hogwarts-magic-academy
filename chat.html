<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色聊天 - Character Chat</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        .chat-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
        }

        .back-nav {
            margin-bottom: 20px;
        }

        .back-nav button {
            background: linear-gradient(135deg, #2a1a3e, #1a1a3e);
            border: 2px solid #d4af37;
            color: #d4af37;
            padding: 12px 24px;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            letter-spacing: 2px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .back-nav button:hover {
            background: linear-gradient(135deg, #1a1a3e, #2a1a3e);
            transform: translateY(-2px);
        }

        /* 角色选择区域 */
        .character-selection {
            background: linear-gradient(145deg, rgba(20, 30, 50, 0.95), rgba(10, 20, 40, 0.98));
            border: 3px solid rgba(212, 175, 55, 0.4);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .selection-title {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 1.5rem;
            color: #d4af37;
            text-align: center;
            margin-bottom: 25px;
        }

        .character-cards {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .character-card {
            background: rgba(212, 175, 55, 0.1);
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            width: 200px;
        }

        .character-card:hover {
            background: rgba(212, 175, 55, 0.2);
            border-color: rgba(212, 175, 55, 0.5);
            transform: translateY(-5px);
        }

        .character-card.selected {
            background: rgba(212, 175, 55, 0.25);
            border-color: #d4af37;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
        }

        .character-avatar {
            font-size: 4rem;
            margin-bottom: 10px;
        }

        .character-name {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 1.2rem;
            color: #d4af37;
            margin-bottom: 5px;
        }

        .character-title {
            font-size: 0.85rem;
            color: #8b6914;
        }

        /* 聊天区域 */
        .chat-interface {
            background: linear-gradient(145deg, rgba(20, 30, 50, 0.95), rgba(10, 20, 40, 0.98));
            border: 3px solid rgba(212, 175, 55, 0.4);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            min-height: 500px;
            overflow: hidden;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 2px solid rgba(212, 175, 55, 0.2);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chat-header-avatar {
            font-size: 3rem;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-name {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 1.5rem;
            color: #d4af37;
        }

        .chat-header-status {
            font-size: 0.9rem;
            color: #90ee90;
        }

        .chat-messages {
            flex: 1;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 75%;
            padding: 15px 20px;
            border-radius: 20px;
            font-size: 1rem;
            line-height: 1.5;
            animation: messageSlide 0.3s ease;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-character {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15), rgba(212, 175, 55, 0.08));
            border: 2px solid rgba(212, 175, 55, 0.3);
            color: #d4af37;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }

        .message-user {
            background: linear-gradient(135deg, rgba(42, 71, 42, 0.3), rgba(42, 71, 42, 0.2));
            border: 2px solid rgba(42, 71, 42, 0.5);
            color: #90ee90;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .chat-input-area {
            padding: 20px;
            border-top: 2px solid rgba(212, 175, 55, 0.2);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 预设问题 */
        .preset-questions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .preset-question {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: #d4af37;
            padding: 8px 16px;
            font-family: 'MedievalSharp', cursive;
            font-size: 0.85rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .preset-question:hover {
            background: rgba(212, 175, 55, 0.2);
            border-color: rgba(212, 175, 55, 0.5);
            transform: translateY(-2px);
        }

        .chat-input-wrapper {
            display: flex;
            gap: 12px;
        }

        .chat-input {
            flex: 1;
            background: rgba(212, 175, 55, 0.05);
            border: 2px solid rgba(212, 175, 55, 0.3);
            color: #d4af37;
            padding: 14px 20px;
            font-family: 'MedievalSharp', cursive;
            font-size: 1rem;
            border-radius: 25px;
            outline: none;
            transition: all 0.3s ease;
        }

        .chat-input::placeholder {
            color: #8b6914;
        }

        .chat-input:focus {
            border-color: #d4af37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .send-btn {
            background: linear-gradient(135deg, #d4af37, #c9a227);
            border: none;
            color: #1a1a3e;
            padding: 14px 28px;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 2px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* 滚动条 */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: rgba(212, 175, 55, 0.1);
            border-radius: 3px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(212, 175, 55, 0.4);
            border-radius: 3px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .chat-container {
                padding: 20px 10px;
            }

            .character-card {
                width: 140px;
                padding: 15px;
            }

            .character-avatar {
                font-size: 3rem;
            }

            .message {
                max-width: 85%;
            }
        }

        /* 打字动画 */
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 15px 20px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: rgba(212, 175, 55, 0.5);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .typing-dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes typingBounce {
            0%, 80%, 100% {
                transform: scale(0.8);
                opacity: 0.5;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .title-zh {
            display: block;
        }

        .title-en {
            display: none;
        }

        body.lang-en .title-en {
            display: block !important;
        }

        body.lang-en .title-zh {
            display: none !important;
        }

        body.lang-en .lang-zh {
            display: none !important;
        }

        body.lang-zh .lang-en {
            display: none !important;
        }
    </style>
</head>

                        'suggest|help|advice|how': ['Um... let me think. Maybe we should find Hermione?', 'Sometimes the simplest solution is the best.'],
                        'house|sorting hat': ['Almost all Weasleys are Gryffindors, me too!', 'Fight for Gryffindor!'],

                    }
                },
                presetQuestions: {
                    zh: [
                        '罗恩，霍格沃茨最好吃的食物是什么？',
                        '教我下威森加摩棋吧',
                        '你和赫敏是怎么回事？',
                        '韦斯莱一家是什么样的？',
                        '你有什么害怕的东西吗？'
                    ],
                    en: [
                        'What\'s the best food at Hogwarts?',
                        'Teach me wizard chess',
                        'What\'s going on with you and Hermione?',
                        'What\'s the Weasley family like?',
                        'What are you afraid of?'
                    ]
                }
            }
        };

        // ==================== 默认回复 ====================
        const defaultResponses = {
            zh: [
                '这是个有趣的问题！让我想想...',
                '嗯...我也不太确定，但我们可以一起探讨！',
                '好问题！或许你可以在图书馆找到答案。',
                '这让我想起了我在霍格沃茨的某次经历...',
                '我明白你的意思了！这确实值得思考。',
                '你的想法很有趣！多告诉我一些吧。',
                '魔法世界充满了奇迹，不是吗？',
                '也许我们可以问问赫敏，她肯定知道！'
            ],
            en: [
                'That\'s an interesting question! Let me think...',
                'Hmm... I\'m not sure either, but we can explore together!',
                'Good question! Maybe you can find the answer in the library.',
                'This reminds me of an experience at Hogwarts...',
                'I understand what you mean! That\'s worth thinking about.',
                'Your idea is interesting! Tell me more.',
                'The magical world is full of wonders, isn\'t it?',
                'Maybe we should ask Hermione, she definitely knows!'
            ]
        };

        // ==================== 全局变量 ====================
        let currentCharacter = null;
        let messageHistory = [];

        // ==================== 初始化 ====================
        function init() {
            updateLanguage();
            createMagicParticles();
            updatePresetQuestions();
        }

        function updateLanguage() {
            document.body.classList.remove('lang-zh', 'lang-en');
            document.body.classList.add(`lang-${currentLang}`);
        }

        // ==================== 角色选择 ====================
        function selectCharacter(characterId) {
            currentCharacter = characterId;
            const character = characters[characterId];

            // 更新选中状态
            document.querySelectorAll('.character-card').forEach(card => {
                card.classList.remove('selected');
            });
            document.getElementById(`card-${characterId}`).classList.add('selected');

            // 更新聊天头部
            document.getElementById('chatAvatar').textContent = character.avatar;
            document.getElementById('chatName').innerHTML = `
                <span class="lang-zh">${character.name.zh}</span>
                <span class="lang-en">${character.name.en}</span>
            `;

            // 清空聊天历史
            messageHistory = [];
            document.getElementById('chatMessages').innerHTML = '';

            // 发送欢迎消息
            const welcomeMessages = {
                hermione: {
                    zh: '📚 你好！我是赫敏。有什么魔法或学习上的问题，尽管问我吧！',
                    en: '📚 Hello! I\'m Hermione. Feel free to ask me any questions about magic or studies!'
                },
                harry: {
                    zh: '⚡ 嘿！我是哈利。很高兴和你聊天！有什么想问的吗？',
                    en: '⚡ Hey! I\'m Harry. Nice to chat with you! What would you like to ask?'
                },
                ron: {
                    zh: '♟️ 嗨！我是罗恩。只要是关于下棋、食物或者冒险的话题，我都在行！',
                    en: '♟️ Hi! I\'m Ron. As long as it\'s about chess, food, or adventures, I\'m your guy!'
                }
            };

            addCharacterMessage(welcomeMessages[characterId][currentLang]);
            updatePresetQuestions();
        }

        // ==================== 预设问题 ====================
        function updatePresetQuestions() {
            const container = document.getElementById('presetQuestions');
            if (!currentCharacter) {
                container.innerHTML = '';
                return;
            }

            const character = characters[currentCharacter];
            const questions = character.presetQuestions[currentLang];

            container.innerHTML = questions.map(q => `
                <button class="preset-question" onclick="sendPresetQuestion('${q}')">${q}</button>
            `).join('');
        }

        function sendPresetQuestion(question) {
            document.getElementById('chatInput').value = question;
            sendMessage();
        }

        // ==================== 消息处理 ====================
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();

            if (!text) return;

            if (!currentCharacter) {
                showMessage('请先选择一个角色 / Please select a character first', 'character');
                return;
            }

            // 添加用户消息
            addUserMessage(text);
            input.value = '';

            // 显示打字指示器
            showTypingIndicator();

            // 模拟思考延迟
            setTimeout(() => {
                hideTypingIndicator();
                const response = generateResponse(text);
                addCharacterMessage(response);
            }, 1000 + Math.random() * 1000);
        }

        function generateResponse(userInput) {
            const character = characters[currentCharacter];
            const responses = character.keywordResponses[currentLang];
            const defaults = defaultResponses[currentLang];
            const inputLower = userInput.toLowerCase();

            // 遍历所有关键词模式
            for (const [pattern, answers] of Object.entries(responses)) {
                const keywords = pattern.split('|');
                for (const keyword of keywords) {
                    if (inputLower.includes(keyword.toLowerCase())) {
                        // 找到匹配，随机返回一个答案
                        return answers[Math.floor(Math.random() * answers.length)];
                    }
                }
            }

            // 没有匹配到关键词，返回默认回复
            return defaults[Math.floor(Math.random() * defaults.length)];
        }

        function addUserMessage(text) {
            addMessage(text, 'user');
            messageHistory.push({ type: 'user', text });
        }

        function addCharacterMessage(text) {
            addMessage(text, 'character');
            messageHistory.push({ type: 'character', text });
            scrollToBottom();
        }

        function addMessage(text, type) {
            const container = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message message-${type}`;
            messageDiv.textContent = text;
            container.appendChild(messageDiv);
            scrollToBottom();
        }

        function showTypingIndicator() {
            const container = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typingIndicator';
            typingDiv.className = 'message message-character';
            typingDiv.innerHTML = `
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            container.appendChild(typingDiv);
            scrollToBottom();
        }

        function hideTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }

        function scrollToBottom() {
            const container = document.getElementById('chatMessages');
            if (container) {
                container.scrollTop = container.scrollHeight;
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // ==================== 返回 ====================
        function goBack() {
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.8s ease-in-out';
            setTimeout(() => {
                window.location.href = 'academy.html';
            }, 800);
        }

        // ==================== 魔法粒子 ====================
        function createMagicParticles() {
            const container = document.querySelector('.magic-particles');
            if (!container) return;

            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(particle);
            }
        }

        // ==================== 页面加载初始化 ====================
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
